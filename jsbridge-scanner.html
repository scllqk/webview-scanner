<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>JSBridge Scanner v2</title>
<style>
:root {
  --bg: #0f0f23; --card: #1a1a2e; --card-hover: #16213e;
  --text: #eee; --text-dim: #888;
  --blue: #00d4ff; --red: #ff4757; --yellow: #ffa502; --green: #2ed573;
  --purple: #a855f7; --pink: #ec4899;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; font-size: 16px; }
.container { max-width: 700px; margin: 0 auto; padding: 20px; }

.header { text-align: center; padding: 30px 0 20px; }
.header h1 { margin: 0; font-size: 28px; color: var(--blue); font-weight: 700; }
.header p { color: var(--text-dim); font-size: 14px; margin-top: 8px; }

/* 统计卡片 */
.stats { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.stat-box { flex: 1; min-width: 80px; background: var(--card); padding: 14px 10px; border-radius: 12px; text-align: center; }
.stat-box .count { font-size: 28px; font-weight: bold; display: block; }
.stat-box .label { font-size: 12px; color: var(--text-dim); }
.stat-box.high .count { color: var(--red); }
.stat-box.medium .count { color: var(--yellow); }
.stat-box.safe .count { color: var(--green); }
.stat-box.total .count { color: var(--blue); }

/* 筛选按钮 */
.filter-bar { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.filter-btn { flex: 1; min-width: 60px; padding: 12px 8px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; transition: opacity 0.2s; }
.filter-btn:active { opacity: 0.7; }
.filter-btn.all { background: var(--blue); color: #000; }
.filter-btn.high { background: var(--red); color: #fff; }
.filter-btn.medium { background: var(--yellow); color: #000; }
.filter-btn.safe { background: var(--green); color: #000; }

/* 搜索框 */
.search-box { margin-bottom: 20px; }
.search-input { width: 100%; padding: 14px 16px; border: 2px solid var(--card); border-radius: 10px; background: var(--card); color: var(--text); font-size: 16px; outline: none; }
.search-input:focus { border-color: var(--blue); }
.search-input::placeholder { color: var(--text-dim); }

/* 工具栏 */
.toolbar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.tool-btn { padding: 12px 16px; border: none; border-radius: 8px; background: var(--card); color: var(--text); font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
.tool-btn:active { background: var(--card-hover); }

/* 结果列表 */
.results { margin-bottom: 30px; }
.item { background: var(--card); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
.item-header { padding: 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
.item-header:active { background: var(--card-hover); }
.item-name { font-weight: 600; font-size: 16px; }
.item-type { color: var(--text-dim); font-size: 12px; margin-left: 8px; background: var(--bg); padding: 2px 6px; border-radius: 4px; }
.risk-tag { padding: 6px 12px; border-radius: 16px; font-size: 12px; font-weight: bold; }
.risk-tag.high { background: var(--red); color: #fff; }
.risk-tag.medium { background: var(--yellow); color: #000; }
.risk-tag.safe { background: var(--green); color: #000; }

.item-body { display: none; padding: 0 16px 16px; border-top: 1px solid var(--card-hover); }
.item.expanded .item-body { display: block; }

/* 风险说明 */
.risk-reason { background: var(--card-hover); padding: 12px; border-radius: 8px; margin-top: 12px; }
.risk-reason-title { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
.risk-reason.high .risk-reason-title { color: var(--red); }
.risk-reason.medium .risk-reason-title { color: var(--yellow); }
.risk-reason.safe .risk-reason-title { color: var(--green); }
.risk-reason-content { font-size: 13px; color: var(--text-dim); line-height: 1.6; }

/* 验证和复制按钮 */
.action-btns { display: flex; gap: 8px; margin-top: 12px; }
.action-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
.action-btn.verify { background: var(--blue); color: #000; }
.action-btn.copy { background: var(--purple); color: #fff; }
.action-btn.test { background: var(--pink); color: #fff; }
.action-btn:active { opacity: 0.8; }

.verify-result { margin-top: 10px; padding: 10px; background: var(--bg); border-radius: 6px; font-size: 12px; font-family: monospace; word-break: break-all; white-space: pre-wrap; }
.verify-result.success { border-left: 3px solid var(--green); }
.verify-result.error { border-left: 3px solid var(--red); }
.verify-result.waiting { border-left: 3px solid var(--yellow); }

/* 子属性 */
.props { margin-top: 12px; }
.props-title { font-size: 13px; color: var(--text-dim); margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
.props-toggle { color: var(--blue); cursor: pointer; font-size: 12px; }
.prop { padding: 8px 0; border-bottom: 1px solid var(--card-hover); font-family: "SF Mono", Consolas, monospace; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
.prop:last-child { border-bottom: none; }
.prop-left { display: flex; align-items: center; gap: 8px; }
.prop-type { color: var(--blue); font-size: 11px; background: var(--bg); padding: 2px 6px; border-radius: 4px; }
.prop-name { font-weight: 500; }
.prop-name.high { color: var(--red); }
.prop-name.medium { color: var(--yellow); }
.prop-name.safe { color: var(--green); }
.prop-copy { color: var(--text-dim); cursor: pointer; padding: 4px; }
.prop-copy:active { color: var(--blue); }

.arrow { font-size: 12px; transition: transform 0.2s; margin-left: 8px; }
.item.expanded .arrow { transform: rotate(180deg); }
.empty { text-align: center; color: var(--text-dim); padding: 40px 20px; }

/* 存储信息面板 */
.storage-panel { background: var(--card); border-radius: 12px; padding: 16px; margin-bottom: 20px; }
.storage-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; color: var(--blue); }
.storage-item { padding: 10px; background: var(--bg); border-radius: 8px; margin-bottom: 8px; }
.storage-item:last-child { margin-bottom: 0; }
.storage-label { font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
.storage-value { font-size: 13px; word-break: break-all; font-family: monospace; }
.storage-value.empty { color: var(--text-dim); font-style: italic; }

/* 导出弹窗 */
.modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
.modal.show { display: flex; }
.modal-content { background: var(--card); border-radius: 16px; padding: 20px; max-width: 500px; width: 100%; max-height: 80vh; overflow: auto; }
.modal-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
.modal-body { font-size: 13px; font-family: monospace; background: var(--bg); padding: 12px; border-radius: 8px; white-space: pre-wrap; word-break: break-all; max-height: 400px; overflow: auto; }
.modal-close { margin-top: 16px; width: 100%; padding: 12px; border: none; border-radius: 8px; background: var(--blue); color: #000; font-size: 14px; font-weight: 600; cursor: pointer; }

/* Toast 提示 */
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--card); color: var(--text); padding: 12px 24px; border-radius: 20px; font-size: 14px; z-index: 2000; opacity: 0; transition: opacity 0.3s; }
.toast.show { opacity: 1; }

@media (max-width: 480px) {
  .container { padding: 16px; }
  .header h1 { font-size: 24px; }
  .stat-box { padding: 10px 8px; }
  .stat-box .count { font-size: 22px; }
  .item-header { padding: 14px; }
  .item-name { font-size: 15px; }
  .action-btns { flex-wrap: wrap; }
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>JSBridge Scanner v2</h1>
    <p>检测 WebView 中注入的 JS-Native 接口</p>
  </div>

  <!-- 存储信息 -->
  <div class="storage-panel">
    <div class="storage-title">存储信息</div>
    <div class="storage-item">
      <div class="storage-label">Document Cookie</div>
      <div class="storage-value" id="cookie-value">检测中...</div>
    </div>
    <div class="storage-item">
      <div class="storage-label">LocalStorage</div>
      <div class="storage-value" id="localstorage-value">检测中...</div>
    </div>
    <div class="storage-item">
      <div class="storage-label">SessionStorage</div>
      <div class="storage-value" id="sessionstorage-value">检测中...</div>
    </div>
  </div>

  <div class="stats">
    <div class="stat-box total"><span class="count" id="total">0</span><span class="label">总计</span></div>
    <div class="stat-box high"><span class="count" id="high">0</span><span class="label">高风险</span></div>
    <div class="stat-box medium"><span class="count" id="medium">0</span><span class="label">中风险</span></div>
    <div class="stat-box safe"><span class="count" id="safe">0</span><span class="label">安全</span></div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn all" onclick="render('all')">全部</button>
    <button class="filter-btn high" onclick="render('high')">高风险</button>
    <button class="filter-btn medium" onclick="render('medium')">中风险</button>
    <button class="filter-btn safe" onclick="render('safe')">安全</button>
  </div>

  <div class="search-box">
    <input type="text" class="search-input" id="search" placeholder="搜索接口名称..." oninput="applyFilter()">
  </div>

  <div class="toolbar">
    <button class="tool-btn" onclick="exportJSON()">导出 JSON</button>
    <button class="tool-btn" onclick="exportMarkdown()">导出报告</button>
    <button class="tool-btn" onclick="location.reload()">重新扫描</button>
  </div>

  <div class="results" id="results"></div>
</div>

<!-- 导出弹窗 -->
<div class="modal" id="modal">
  <div class="modal-content">
    <div class="modal-title" id="modal-title">导出结果</div>
    <div class="modal-body" id="modal-body"></div>
    <button class="modal-close" onclick="copyModalContent()">复制内容</button>
    <button class="modal-close" style="margin-top:8px;background:var(--card);color:var(--text);" onclick="closeModal()">关闭</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
(function() {
  // ===================== 风险说明 =====================
  const RISK_EXPLANATIONS = {
    high: {
      title: "高风险接口",
      desc: "该接口名称包含敏感操作关键词，可能被用于：",
      reasons: {
        "install": "安装 APK - 可远程下载安装恶意软件",
        "apk": "APK 相关 - 可能安装恶意应用",
        "download": "下载功能 - 可能下载恶意程序",
        "exec": "代码执行 - 可执行任意代码",
        "shell": "Shell 执行 - 可执行系统命令",
        "cmd": "命令执行 - 可执行任意命令",
        "delete": "删除操作 - 可能删除用户数据",
        "remove": "移除操作 - 可能删除数据",
        "format": "格式化 - 可能清空存储",
        "sendsms": "发送短信 - 可能窃取验证码或扣费",
        "sms": "短信功能 - 可能发送/读取短信",
        "call": "拨打电话 - 可能拨打付费号码",
        "dial": "拨号功能 - 可能拨打付费号码",
        "phone": "电话功能 - 可能拨打电话",
        "pay": "支付功能 - 可能发起未授权支付",
        "payment": "支付相关 - 可能发起支付",
        "alipay": "支付宝 - 可能发起支付",
        "wechatpay": "微信支付 - 可能发起支付",
        "login": "登录功能 - 可能获取用户凭证",
        "logout": "登出功能 - 可能操作账号",
        "register": "注册功能 - 可能获取用户信息",
        "signin": "登录 - 可能获取凭证",
        "signup": "注册 - 可能获取信息",
        "eval": "代码执行 - 可执行任意 JS"
      }
    },
    medium: {
      title: "中风险接口",
      desc: "该接口名称包含敏感功能关键词，可能用于：",
      reasons: {
        "open": "打开功能 - 可能调起其他应用",
        "start": "启动功能 - 可能启动应用/服务",
        "launch": "启动应用 - 可能调起其他应用",
        "intent": "Intent 操作 - 可能调起 Android 组件",
        "activity": "Activity 操作 - 可能启动界面",
        "package": "包管理 - 可能获取应用信息",
        "device": "设备信息 - 可能获取设备标识",
        "imei": "IMEI - 获取设备唯一标识",
        "imsi": "IMSI - 获取 SIM 卡标识",
        "mac": "MAC 地址 - 获取网络标识",
        "serial": "序列号 - 获取设备标识",
        "androidid": "Android ID - 获取设备标识",
        "idfa": "IDFA - iOS 广告标识",
        "idfv": "IDFV - iOS 应用标识",
        "location": "位置信息 - 可能获取用户位置",
        "gps": "GPS 定位 - 获取精确位置",
        "geolocation": "地理位置 - 获取用户位置",
        "contact": "联系人 - 可能读取通讯录",
        "addressbook": "通讯录 - 可能读取联系人",
        "camera": "摄像头 - 可能拍照或录像",
        "photo": "相册 - 可能读取图片",
        "video": "视频 - 可能录像或读取视频",
        "audio": "音频 - 可能录音",
        "record": "录音 - 可能录制音频",
        "microphone": "麦克风 - 可能录音",
        "file": "文件操作 - 可能读写用户文件",
        "readfile": "读取文件 - 可能读取敏感文件",
        "writefile": "写入文件 - 可能修改文件",
        "save": "保存功能 - 可能保存数据",
        "load": "加载功能 - 可能读取数据",
        "clipboard": "剪贴板 - 可能读取/写入剪贴板",
        "paste": "粘贴 - 可能读取剪贴板",
        "copy": "复制 - 可能写入剪贴板",
        "notification": "通知 - 可能发送推送",
        "push": "推送 - 可能发送消息",
        "wifi": "WiFi - 可能获取网络信息",
        "bluetooth": "蓝牙 - 可能获取设备信息",
        "nfc": "NFC - 可能读取 NFC 数据",
        "webview": "WebView - 可能控制页面",
        "storage": "存储 - 可能访问敏感数据",
        "database": "数据库 - 可能访问数据",
        "sqlite": "SQLite - 可能读写数据库",
        "fingerprint": "指纹 - 可能使用生物识别",
        "faceid": "面容ID - 可能使用生物识别",
        "touchid": "指纹ID - 可能使用生物识别",
        "biometric": "生物识别 - 可能使用生物特征"
      }
    },
    safe: {
      title: "安全接口",
      desc: "该接口为常见的 Web 开发接口或应用自定义的非敏感接口，未检测到明显风险关键词。",
      reasons: {}
    }
  };

  // ===================== 完整白名单（合并 show_js.html 和 index.html）=====================
  const WHITELIST = [
    // show_js.html 中的完整浏览器属性
    "postMessage","blur","focus","close","parent","opener","top","length","frames","closed",
    "location","self","window","document","name","customElements","history","locationbar",
    "menubar","personalbar","scrollbars","statusbar","toolbar","status","frameElement",
    "navigator","origin","external","screen","innerWidth","innerHeight","scrollX",
    "pageXOffset","scrollY","pageYOffset","visualViewport","screenX","screenY","outerWidth",
    "outerHeight","devicePixelRatio","clientInformation","screenLeft","screenTop",
    "defaultStatus","defaultstatus","styleMedia","isSecureContext","performance","stop",
    "open","alert","confirm","prompt","print","queueMicrotask","requestAnimationFrame",
    "cancelAnimationFrame","captureEvents","releaseEvents","requestIdleCallback",
    "cancelIdleCallback","getComputedStyle","matchMedia","moveTo","moveBy","resizeTo",
    "resizeBy","scroll","scrollTo","scrollBy","getSelection","find",
    "webkitRequestAnimationFrame","webkitCancelAnimationFrame","fetch","btoa","atob",
    "setTimeout","clearTimeout","setInterval","clearInterval","createImageBitmap",
    "onappinstalled","onbeforeinstallprompt","crypto","ondevicemotion","ondeviceorientation",
    "ondeviceorientationabsolute","indexedDB","webkitStorageInfo","sessionStorage",
    "localStorage","orientation","onorientationchange","openDatabase","chrome",
    "ontouchcancel","ontouchend","ontouchmove","ontouchstart","speechSynthesis",
    "webkitRequestFileSystem","webkitResolveLocalFileSystemURL",
    // index.html 补充
    "addEventListener","removeEventListener","dispatchEvent",
    // 常见全局对象
    "JSON","Promise","Proxy","Reflect","Map","Set","WeakMap","WeakSet",
    "Object","Function","Array","String","Number","Boolean","Symbol","BigInt","Math","Date",
    "RegExp","Error","TypeError","SyntaxError","ReferenceError","RangeError","URIError",
    "URL","URLSearchParams","Blob","File","FileReader","FileList","FormData","Headers",
    "Request","Response","Image","ImageBitmap","Audio","AudioContext",
    "Node","Element","HTMLElement","Document","DocumentFragment","Event","CustomEvent",
    "MouseEvent","KeyboardEvent","TouchEvent","Attr","CharacterData","Text","Comment",
    "DOMTokenList","NodeList","HTMLCollection",
    "Worker","SharedWorker","ServiceWorker","Notification","Permissions","Geolocation",
    "BroadcastChannel","MessageChannel","MessagePort","AbortController","AbortSignal",
    "IntersectionObserver","MutationObserver","ResizeObserver",
    "XMLHttpRequest","WebSocket","EventSource","console",
    "TEMPORARY","PERSISTENT","attr_list","attr","obj",
    // 事件处理属性
    "onanimationend","onanimationiteration","onanimationstart","onsearch","ontransitionend",
    "onwebkitanimationend","onwebkitanimationiteration","onwebkitanimationstart",
    "onwebkittransitionend","onabort","onblur","oncancel","oncanplay","oncanplaythrough",
    "onchange","onclick","onclose","oncontextmenu","oncuechange","ondblclick","ondrag",
    "ondragend","ondragenter","ondragleave","ondragover","ondragstart","ondrop",
    "ondurationchange","onemptied","onended","onerror","onfocus","oninput","oninvalid",
    "onkeydown","onkeypress","onkeyup","onload","onloadeddata","onloadedmetadata",
    "onloadstart","onmousedown","onmouseenter","onmouseleave","onmousemove","onmouseout",
    "onmouseover","onmouseup","onmousewheel","onpause","onplay","onplaying","onprogress",
    "onratechange","onreset","onresize","onscroll","onseeked","onseeking","onselect",
    "onstalled","onsubmit","onsuspend","ontimeupdate","ontoggle","onvolumechange",
    "onwaiting","onwheel","onauxclick","ongotpointercapture","onlostpointercapture",
    "onpointerdown","onpointermove","onpointerup","onpointercancel","onpointerover",
    "onpointerout","onpointerenter","onpointerleave","onselectstart","onselectionchange",
    "onafterprint","onbeforeprint","onbeforeunload","onhashchange","onlanguagechange",
    "onmessage","onmessageerror","onoffline","ononline","onpagehide","onpageshow",
    "onpopstate","onrejectionhandled","onstorage","onunhandledrejection","onunload"
  ];

  // ===================== 风险关键词 =====================
  const RISK_HIGH = ["install","apk","download","exec","shell","cmd","delete","remove","format","sendsms","sms","call","dial","phone","pay","payment","alipay","wechatpay","login","logout","register","signin","signup","eval"];
  const RISK_MEDIUM = ["open","start","launch","intent","activity","package","device","imei","imsi","meid","mac","serial","androidid","udid","uuid","idfa","idfv","location","geolocation","gps","contact","contacts","addressbook","camera","photo","video","audio","record","microphone","file","readfile","writefile","save","load","clipboard","paste","copy","notification","push","network","wifi","bluetooth","nfc","webview","browser","storage","database","sqlite","db","fingerprint","faceid","touchid","biometric"];

  function getRisk(name) {
    const lower = name.toLowerCase();
    if (RISK_HIGH.some(k => lower.includes(k))) return "high";
    if (RISK_MEDIUM.some(k => lower.includes(k))) return "medium";
    return "safe";
  }

  function getRiskReason(name, risk) {
    if (risk === "safe") return "";
    const lower = name.toLowerCase();
    const reasons = RISK_EXPLANATIONS[risk].reasons;
    for (const [keyword, reason] of Object.entries(reasons)) {
      if (lower.includes(keyword)) return reason;
    }
    return risk === "high" ? "该接口名称包含敏感关键词" : "该接口可能涉及敏感功能";
  }

  // ===================== 检测存储信息 =====================
  function checkStorage() {
    // Cookie
    try {
      const cookie = document.cookie || "(空)";
      document.getElementById("cookie-value").textContent = cookie.length > 200 ? cookie.slice(0, 200) + "..." : cookie;
    } catch(e) {
      document.getElementById("cookie-value").textContent = "(无法访问)";
    }

    // LocalStorage
    try {
      const ls = JSON.stringify(localStorage);
      const lsDisplay = ls === "{}" ? "(空)" : ls;
      document.getElementById("localstorage-value").textContent = lsDisplay.length > 200 ? lsDisplay.slice(0, 200) + "..." : lsDisplay;
    } catch(e) {
      document.getElementById("localstorage-value").textContent = "(无法访问)";
    }

    // SessionStorage
    try {
      const ss = JSON.stringify(sessionStorage);
      const ssDisplay = ss === "{}" ? "(空)" : ss;
      document.getElementById("sessionstorage-value").textContent = ssDisplay.length > 200 ? ssDisplay.slice(0, 200) + "..." : ssDisplay;
    } catch(e) {
      document.getElementById("sessionstorage-value").textContent = "(无法访问)";
    }
  }
  checkStorage();

  // ===================== 扫描 window =====================
  const results = [];
  for (const key in window) {
    if (WHITELIST.includes(key)) continue;
    if (key.startsWith("webkit")) continue;

    const obj = window[key];
    const type = typeof obj;
    const risk = getRisk(key);
    const props = [];

    if (obj && (type === "object" || type === "function")) {
      try {
        for (const p in obj) {
          props.push({ name: p, type: typeof obj[p], risk: getRisk(p) });
        }
      } catch (e) {}
    }

    results.push({ name: key, type, risk, props });
  }

  // 按风险排序
  results.sort((a, b) => {
    const o = { high: 0, medium: 1, safe: 2 };
    return o[a.risk] - o[b.risk];
  });

  // 统计
  const counts = { high: 0, medium: 0, safe: 0 };
  results.forEach(r => counts[r.risk]++);
  document.getElementById("total").textContent = results.length;
  document.getElementById("high").textContent = counts.high;
  document.getElementById("medium").textContent = counts.medium;
  document.getElementById("safe").textContent = counts.safe;

  // ===================== 渲染函数 =====================
  let currentFilter = "all";

  window.render = function(filter) {
    currentFilter = filter;
    applyFilter();
  };

  window.applyFilter = function() {
    const search = document.getElementById("search").value.toLowerCase();
    let list = currentFilter === "all" ? results : results.filter(r => r.risk === currentFilter);
    if (search) {
      list = list.filter(r => r.name.toLowerCase().includes(search) || r.props.some(p => p.name.toLowerCase().includes(search)));
    }

    const container = document.getElementById("results");
    if (!list.length) {
      container.innerHTML = '<div class="empty">没有找到匹配的对象</div>';
      return;
    }

    container.innerHTML = list.map((item, idx) => `
      <div class="item" id="item-${idx}">
        <div class="item-header" onclick="toggleItem(${idx})">
          <div>
            <span class="item-name ${item.risk}">${item.name}</span>
            <span class="item-type">${item.type}</span>
          </div>
          <div>
            <span class="risk-tag ${item.risk}">${item.risk.toUpperCase()}</span>
            <span class="arrow">▼</span>
          </div>
        </div>
        <div class="item-body">
          <div class="risk-reason ${item.risk}">
            <div class="risk-reason-title">${RISK_EXPLANATIONS[item.risk].title}</div>
            <div class="risk-reason-content">
              ${item.risk === 'safe' ? RISK_EXPLANATIONS.safe.desc : RISK_EXPLANATIONS[item.risk].desc + '<br><br>• ' + getRiskReason(item.name, item.risk)}
            </div>
          </div>
          <div class="action-btns">
            <button class="action-btn verify" onclick="verifyInterface(event, '${item.name}', ${idx})">验证接口</button>
            <button class="action-btn copy" onclick="copyName(event, '${item.name}')">复制名称</button>
            <button class="action-btn test" onclick="testInterface(event, '${item.name}')">尝试调用</button>
          </div>
          <div class="verify-result" id="verify-${idx}" style="display:none;"></div>
          ${item.props.length ? `
            <div class="props">
              <div class="props-title">
                <span>子属性 (${item.props.length} 项)</span>
                <span class="props-toggle" onclick="toggleProps(${idx}, event)">展开全部</span>
              </div>
              <div id="props-${idx}">
                ${item.props.slice(0, 5).map(p => `
                  <div class="prop">
                    <div class="prop-left">
                      <span class="prop-type">${p.type}</span>
                      <span class="prop-name ${p.risk}">${p.name}</span>
                    </div>
                    <span class="prop-copy" onclick="copyPropName(event, '${item.name}', '${p.name}')">复制</span>
                  </div>
                `).join('')}
                ${item.props.length > 5 ? `<div class="prop" style="color:var(--text-dim);">...还有 ${item.props.length - 5} 项</div>` : ''}
              </div>
            </div>
          ` : ''}
        </div>
      </div>
    `).join("");
  };

  // ===================== 交互函数 =====================
  window.toggleItem = function(idx) {
    const item = document.getElementById(`item-${idx}`);
    item.classList.toggle("expanded");
  };

  window.toggleProps = function(idx, e) {
    e.stopPropagation();
    const container = document.getElementById(`props-${idx}`);
    const item = results.filter(r => currentFilter === "all" || r.risk === currentFilter)[idx];
    if (!item) return;

    const isExpanded = container.dataset.expanded === "true";
    if (isExpanded) {
      container.innerHTML = item.props.slice(0, 5).map(p => `
        <div class="prop">
          <div class="prop-left">
            <span class="prop-type">${p.type}</span>
            <span class="prop-name ${p.risk}">${p.name}</span>
          </div>
          <span class="prop-copy" onclick="copyPropName(event, '${item.name}', '${p.name}')">复制</span>
        </div>
      `).join('') + (item.props.length > 5 ? `<div class="prop" style="color:var(--text-dim);">...还有 ${item.props.length - 5} 项</div>` : '');
      container.dataset.expanded = "false";
      e.target.textContent = "展开全部";
    } else {
      container.innerHTML = item.props.map(p => `
        <div class="prop">
          <div class="prop-left">
            <span class="prop-type">${p.type}</span>
            <span class="prop-name ${p.risk}">${p.name}</span>
          </div>
          <span class="prop-copy" onclick="copyPropName(event, '${item.name}', '${p.name}')">复制</span>
        </div>
      `).join('');
      container.dataset.expanded = "true";
      e.target.textContent = "收起";
    }
  };

  window.verifyInterface = function(e, name, idx) {
    e.stopPropagation();
    const resultDiv = document.getElementById(`verify-${idx}`);
    resultDiv.style.display = 'block';
    resultDiv.className = 'verify-result waiting';
    resultDiv.textContent = '正在验证...';

    setTimeout(() => {
      try {
        const obj = window[name];
        if (obj !== undefined) {
          const type = typeof obj;
          if (type === 'function') {
            resultDiv.className = 'verify-result success';
            resultDiv.textContent = `✓ 接口存在\n类型: function\n代码预览: ${obj.toString().slice(0, 150)}${obj.toString().length > 150 ? '...' : ''}`;
          } else if (type === 'object') {
            const keys = Object.keys(obj);
            resultDiv.className = 'verify-result success';
            resultDiv.textContent = `✓ 接口存在\n类型: object\n可枚举属性: ${keys.length} 项\n属性列表: ${keys.slice(0, 8).join(', ')}${keys.length > 8 ? '...' : ''}`;
          } else {
            resultDiv.className = 'verify-result success';
            resultDiv.textContent = `✓ 接口存在\n类型: ${type}\n值: ${String(obj).slice(0, 100)}`;
          }
        } else {
          resultDiv.className = 'verify-result error';
          resultDiv.textContent = '✗ 接口不存在 (undefined)';
        }
      } catch(err) {
        resultDiv.className = 'verify-result error';
        resultDiv.textContent = '✗ 验证失败: ' + err.message;
      }
    }, 50);
  };

  window.copyName = function(e, name) {
    e.stopPropagation();
    copyToClipboard(name);
    showToast("已复制: " + name);
  };

  window.copyPropName = function(e, parent, prop) {
    e.stopPropagation();
    copyToClipboard(`${parent}.${prop}`);
    showToast("已复制: " + parent + "." + prop);
  };

  window.testInterface = function(e, name) {
    e.stopPropagation();
    try {
      const obj = window[name];
      if (typeof obj === 'function') {
        // 尝试无参调用
        const result = obj();
        showToast("调用成功，返回: " + String(result).slice(0, 50));
      } else if (typeof obj === 'object') {
        showToast("这是一个对象，请手动查看属性");
      } else {
        showToast("类型: " + typeof obj + ", 值: " + String(obj));
      }
    } catch(err) {
      showToast("调用失败: " + err.message);
    }
  };

  // ===================== 导出功能 =====================
  window.exportJSON = function() {
    const data = {
      scanTime: new Date().toISOString(),
      userAgent: navigator.userAgent,
      url: location.href,
      cookie: document.cookie,
      localStorage: Object.fromEntries(Object.entries(localStorage)),
      sessionStorage: Object.fromEntries(Object.entries(sessionStorage)),
      results: results
    };
    showModal("导出 JSON", JSON.stringify(data, null, 2));
  };

  window.exportMarkdown = function() {
    let md = `# JSBridge 扫描报告\n\n`;
    md += `**扫描时间**: ${new Date().toLocaleString()}\n\n`;
    md += `**页面 URL**: ${location.href}\n\n`;
    md += `**User-Agent**: ${navigator.userAgent}\n\n`;
    md += `## 统计\n\n`;
    md += `- 总计: ${results.length}\n`;
    md += `- 高风险: ${counts.high}\n`;
    md += `- 中风险: ${counts.medium}\n`;
    md += `- 安全: ${counts.safe}\n\n`;
    md += `## 检测结果\n\n`;

    ['high', 'medium', 'safe'].forEach(risk => {
      const items = results.filter(r => r.risk === risk);
      if (items.length) {
        md += `### ${risk.toUpperCase()} 风险 (${items.length} 项)\n\n`;
        items.forEach(item => {
          md += `- **${item.name}** (${item.type})\n`;
          if (item.props.length) {
            item.props.slice(0, 10).forEach(p => {
              md += `  - ${p.type}: ${p.name}\n`;
            });
          }
        });
        md += `\n`;
      }
    });

    showModal("导出报告", md);
  };

  window.showModal = function(title, content) {
    document.getElementById("modal-title").textContent = title;
    document.getElementById("modal-body").textContent = content;
    document.getElementById("modal").classList.add("show");
  };

  window.closeModal = function() {
    document.getElementById("modal").classList.remove("show");
  };

  window.copyModalContent = function() {
    const content = document.getElementById("modal-body").textContent;
    copyToClipboard(content);
    showToast("已复制到剪贴板");
  };

  // ===================== 工具函数 =====================
  function copyToClipboard(text) {
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text);
    } else {
      const textarea = document.createElement("textarea");
      textarea.value = text;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand("copy");
      document.body.removeChild(textarea);
    }
  }

  function showToast(msg) {
    const toast = document.getElementById("toast");
    toast.textContent = msg;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 2000);
  }

  // 初始渲染
  render("all");

  // 检测完成提示
  setTimeout(() => {
    alert("扫描完成！\n\n共发现 " + results.length + " 个非白名单对象\n高风险: " + counts.high + "\n中风险: " + counts.medium + "\n安全: " + counts.safe);
  }, 300);
})();
</script>
</body>
</html>
