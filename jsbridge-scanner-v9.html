<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>JSBridge Scanner v9 - 漏洞案例增强版</title>
<style>
:root {
 --bg: #0f0f23; --card: #1a1a2e; --card-hover: #16213e;
 --text: #eee; --text-dim: #888;
 --blue: #00d4ff; --red: #ff4757; --yellow: #ffa502; --green: #2ed573;
 --purple: #a855f7; --orange: #ff7f50; --critical: #ff0040;
 --font-size-base: 14px;
}
[data-theme="light"] {
 --bg: #f5f5f5; --card: #ffffff; --card-hover: #e8e8e8;
 --text: #222; --text-dim: #666;
}
@media (max-width: 480px) { :root { --font-size-base: 12px; } }
@media (min-width: 800px) { :root { --font-size-base: 16px; } }
* { box-sizing: border-box; }
body {
 font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
 background: var(--bg); color: var(--text); margin: 0; padding: 0;
 font-size: var(--font-size-base); line-height: 1.5;
}
.container { max-width: 1000px; margin: 0 auto; padding: 12px; }

/* 头部 */
.header { text-align: center; padding: 12px 0 8px; }
.header h1 { margin: 0; font-size: 1.4em; color: var(--blue); font-weight: 700; }
.header .badge { background: linear-gradient(135deg, var(--red), var(--orange)); color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 0.7em; margin-left: 6px; }
.header p { color: var(--text-dim); font-size: 0.8em; margin-top: 4px; }

/* 案例面板 */
.case-panel { background: var(--card); border-radius: 10px; padding: 12px; margin-bottom: 12px; border-left: 4px solid var(--red); }
.case-panel.medium { border-left-color: var(--yellow); }
.case-title { font-size: 0.95em; font-weight: 600; margin-bottom: 8px; color: var(--orange); }
.case-list { max-height: 300px; overflow-y: auto; }
.case-item { background: var(--bg); border-radius: 6px; padding: 10px; margin-bottom: 8px; }
.case-item:last-child { margin-bottom: 0; }
.case-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; flex-wrap: wrap; gap: 5px; }
.case-name { font-weight: 600; color: var(--text); }
.case-tag { padding: 2px 8px; border-radius: 4px; font-size: 0.7em; font-weight: bold; }
.case-tag.critical { background: var(--critical); color: #fff; }
.case-tag.high { background: var(--red); color: #fff; }
.case-tag.medium { background: var(--yellow); color: #000; }
.case-desc { color: var(--text-dim); font-size: 0.85em; margin-bottom: 6px; }
.case-poc { background: #000; border-radius: 4px; padding: 8px; font-family: monospace; font-size: 0.8em; color: var(--green); overflow-x: auto; word-break: break-all; margin-bottom: 6px; }
.case-ref { font-size: 0.75em; color: var(--blue); }

/* 统计 */
.stats { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
.stat-box { flex: 1; min-width: 55px; background: var(--card); padding: 8px 5px; border-radius: 8px; text-align: center; cursor: pointer; }
.stat-box:hover { transform: scale(1.02); }
.stat-box .count { font-size: 1.3em; font-weight: bold; display: block; }
.stat-box .label { font-size: 0.65em; color: var(--text-dim); }
.stat-box.critical .count { color: var(--critical); }
.stat-box.high .count { color: var(--red); }
.stat-box.medium .count { color: var(--yellow); }
.stat-box.low .count { color: var(--green); }
.stat-box.total .count { color: var(--blue); }

/* 搜索 */
.search-box { margin-bottom: 10px; display: flex; gap: 6px; }
.search-input { flex: 1; padding: 10px; border: 2px solid var(--card); border-radius: 6px; background: var(--card); color: var(--text); font-size: 0.95em; outline: none; }
.search-input:focus { border-color: var(--blue); }

/* 工具栏 */
.toolbar { display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; }
.tool-btn { padding: 8px 12px; border: none; border-radius: 5px; background: var(--card); color: var(--text); font-size: 0.8em; cursor: pointer; }
.tool-btn:hover { background: var(--card-hover); }
.tool-btn.primary { background: var(--blue); color: #000; }

/* 接口列表 */
.results { margin-bottom: 15px; }
.item { background: var(--card); border-radius: 8px; margin-bottom: 6px; overflow: hidden; border-left: 3px solid transparent; }
.item.critical { border-left-color: var(--critical); }
.item.high { border-left-color: var(--red); }
.item.medium { border-left-color: var(--yellow); }
.item.low { border-left-color: var(--green); }
.item:hover { background: var(--card-hover); }

.item-header { padding: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
.item-name { font-weight: 600; font-size: 0.92em; }
.item-type { color: var(--text-dim); font-size: 0.65em; background: var(--bg); padding: 1px 4px; border-radius: 3px; margin-left: 4px; }
.item-category { color: var(--blue); font-size: 0.65em; margin-left: 6px; }
.item-right { display: flex; align-items: center; gap: 5px; }
.risk-tag { padding: 2px 6px; border-radius: 10px; font-size: 0.6em; font-weight: bold; }
.risk-tag.critical { background: var(--critical); color: #fff; }
.risk-tag.high { background: var(--red); color: #fff; }
.risk-tag.medium { background: var(--yellow); color: #000; }
.risk-tag.low { background: var(--green); color: #000; }
.arrow { font-size: 0.65em; color: var(--text-dim); transition: transform 0.2s; }
.item.expanded .arrow { transform: rotate(180deg); }

.item-body { display: none; padding: 0 10px 10px; border-top: 1px solid var(--card-hover); }
.item.expanded .item-body { display: block; }

.item-info { padding: 8px; background: rgba(255,71,87,0.1); border-radius: 6px; margin-bottom: 8px; font-size: 0.78em; }
.item-info-title { color: var(--red); font-weight: 600; margin-bottom: 3px; }
.item-info-desc { color: var(--text-dim); }

.method-list { max-height: 250px; overflow-y: auto; }
.method-item { padding: 5px 6px; background: var(--bg); border-radius: 4px; margin-bottom: 3px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.method-type { font-size: 0.6em; padding: 1px 4px; border-radius: 3px; background: var(--purple); color: #fff; }
.method-type.function { background: var(--blue); color: #000; }
.method-name { font-family: monospace; font-size: 0.78em; }
.method-btn { padding: 2px 6px; border: none; border-radius: 3px; font-size: 0.65em; cursor: pointer; background: var(--card-hover); color: var(--text); }

/* 调用面板 */
.call-panel { margin-top: 8px; background: var(--bg); border-radius: 6px; padding: 8px; }
.call-title { font-size: 0.8em; font-weight: 600; margin-bottom: 6px; color: var(--blue); }
.call-row { display: flex; gap: 5px; margin-bottom: 6px; }
.call-input { flex: 1; padding: 6px; border: 1px solid var(--card); border-radius: 4px; background: var(--card); color: var(--text); font-size: 0.78em; font-family: monospace; }
.call-btn { padding: 6px 10px; border: none; border-radius: 4px; background: var(--blue); color: #000; font-weight: 600; cursor: pointer; font-size: 0.75em; }
.call-result { margin-top: 6px; padding: 6px; border-radius: 4px; font-size: 0.7em; font-family: monospace; white-space: pre-wrap; word-break: break-all; max-height: 120px; overflow: auto; display: none; }
.call-result.success { background: rgba(46,213,115,0.1); border-left: 2px solid var(--green); }
.call-result.error { background: rgba(255,71,87,0.1); border-left: 2px solid var(--red); }
.call-result.info { background: rgba(0,212,255,0.1); border-left: 2px solid var(--blue); }

/* Modal */
.modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; padding: 15px; }
.modal.show { display: flex; }
.modal-content { background: var(--card); border-radius: 10px; padding: 15px; max-width: 750px; width: 100%; max-height: 85vh; overflow: auto; }
.modal-title { font-size: 1.05em; font-weight: 600; margin-bottom: 10px; }
.modal-body { font-size: 0.72em; font-family: monospace; background: var(--bg); padding: 10px; border-radius: 6px; white-space: pre-wrap; word-break: break-all; max-height: 58vh; overflow: auto; }
.modal-btn { width: 100%; padding: 10px; border: none; border-radius: 6px; font-size: 0.85em; font-weight: 600; cursor: pointer; margin-top: 6px; }
.modal-btn.primary { background: var(--blue); color: #000; }
.modal-btn.secondary { background: var(--card-hover); color: var(--text); }

.toast { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); background: var(--card); color: var(--text); padding: 8px 16px; border-radius: 14px; font-size: 0.85em; z-index: 2000; opacity: 0; transition: opacity 0.3s; max-width: 90%; text-align: center; }
.toast.show { opacity: 1; }
.empty { text-align: center; color: var(--text-dim); padding: 20px; font-size: 0.9em; }

.theme-toggle { position: absolute; top: 15px; right: 15px; background: var(--card); border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; color: var(--text); font-size: 0.85em; }
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()">🌓 切换主题</button>
<div class="container">
<div class="header">
 <h1>JSBridge Scanner v9<span class="badge">漏洞案例增强版</span></h1>
 <p>真实漏洞案例 | PoC利用方法 | CVE参考 | 风险评分</p>

<div class="toolbar">

<div class="modal" id="modal">

// ===================== 基线检测 =====================
function getInjectedProps() {
 try {
  const iframe = document.createElement('iframe');
  iframe.style.display = 'none';
  document.body.appendChild(iframe);
  const cleanWindow = iframe.contentWindow;
  const current = Object.getOwnPropertyNames(window);
  const clean = Object.getOwnPropertyNames(cleanWindow);
  document.body.removeChild(iframe);
  return current.filter(p => !clean.includes(p));
 } catch(e) {
  const baseline = ["postMessage","blur","focus","close","parent","opener","top","length","frames","closed","location","self","window","document","name","customElements","history","locationbar","menubar","personalbar","scrollbars","statusbar","toolbar","status","frameElement","navigator","origin","external","screen","innerWidth","innerHeight","scrollX","pageXOffset","scrollY","pageYOffset","visualViewport","screenX","screenY","outerWidth","outerHeight","devicePixelRatio","clientInformation","screenLeft","screenTop","defaultStatus","defaultstatus","styleMedia","isSecureContext","performance","stop","open","alert","confirm","prompt","print","queueMicrotask","requestAnimationFrame","cancelAnimationFrame","captureEvents","releaseEvents","requestIdleCallback","cancelIdleCallback","getComputedStyle","matchMedia","moveTo","moveBy","resizeTo","resizeBy","scroll","scrollTo","scrollBy","getSelection","find","webkitRequestAnimationFrame","webkitCancelAnimationFrame","fetch","btoa","atob","setTimeout","clearTimeout","setInterval","clearInterval","createImageBitmap","onappinstalled","onbeforeinstallprompt","crypto","ondevicemotion","ondeviceorientation","ondeviceorientationabsolute","indexedDB","webkitStorageInfo","sessionStorage","localStorage","orientation","onorientationchange","openDatabase","ontouchcancel","ontouchend","ontouchmove","ontouchstart","TEMPORARY","PERSISTENT","addEventListener","removeEventListener","dispatchEvent"];
  const result = [];
  for (const key in window) {
   if (!baseline.includes(key) && !key.startsWith("on") && !key.startsWith("webkit")) {
    result.push(key);
   }
  }
  return result;
 }
}

// ===================== JSBridge识别 =====================
function isLikelyBridge(obj) {
 if (!obj) return false;
 try {
  const type = typeof obj;
  if (type === "function") return true;
  if (type !== "object") return false;
  const keys = Object.keys(obj);
  if (keys.length === 0 || keys.length > 100) return false;
  return keys.some(k => typeof obj[k] === "function");
 } catch(e) {
  return false;
 }
}

// ===================== 接口识别 =====================
function identifyInterface(name) {
 const str = name.toLowerCase();
 for (const [key, info] of Object.entries(INTERFACE_KNOWLEDGE)) {
  for (const kw of info.keywords) {
   if (str.includes(kw.toLowerCase())) {
    return { category: info.category, ...info, matchedKeyword: kw };
   }
  }
 }
 return null;
}

// ===================== 获取案例 =====================
function getCaseById(caseId) {
 if (!caseId) return null;
 return VULN_CASES.find(c => c.id === caseId) || null;
}

// ===================== 扫描执行 =====================
const injectedProps = getInjectedProps();
const scanResults = [];
const detectedCases = new Set();

for (const key of injectedProps) {
 const obj = window[key];
 const type = typeof obj;

 if (!isLikelyBridge(obj)) continue;

 const methods = [];
 const objInfo = identifyInterface(key);
 let maxRisk = objInfo ? objInfo.riskLevel : "pending";
 let maxCVSS = objInfo ? objInfo.cvss : 0;

 if (objInfo && objInfo.caseId) {
  detectedCases.add(objInfo.caseId);
 }

 if (obj && (type === "object" || type === "function")) {
  for (const prop in obj) {
   try {
    const propType = typeof obj[prop];
    const propInfo = identifyInterface(prop);
    const propRisk = propInfo ? propInfo.riskLevel : "pending";

    if (propInfo && propInfo.caseId) {
     detectedCases.add(propInfo.caseId);
    }

    const levelOrder = { critical: 0, high: 1, medium: 2, low: 3, pending: 4 };
    if (levelOrder[propRisk] < levelOrder[maxRisk]) maxRisk = propRisk;
    if (propInfo && propInfo.cvss > maxCVSS) maxCVSS = propInfo.cvss;

    methods.push({ name: prop, type: propType, risk: propRisk, interfaceInfo: propInfo });
   } catch(e) {}
  }
 }

 scanResults.push({
  name: key,
  type: type,
  risk: maxRisk,
  cvss: maxCVSS,
  methods: methods,
  interfaceInfo: objInfo
 });
}

// 排序
const order = { critical: 0, high: 1, medium: 2, low: 3, pending: 4 };
scanResults.sort((a, b) => order[a.risk] - order[b.risk]);

// 统计
const counts = { critical: 0, high: 0, medium: 0, low: 0, pending: 0, total: scanResults.length };
scanResults.forEach(r => counts[r.risk]++);

window.scanResults = scanResults;
window.detectedCases = Array.from(detectedCases);

renderResults(currentFilter);

function renderResults(filter) {
 currentFilter = filter;
 let list = filter === "all" ? [...scanResults] : scanResults.filter(r => r.risk === filter);

 const search = document.getElementById("search").value.toLowerCase();
 if (search) {
  list = list.filter(r =>
   r.name.toLowerCase().includes(search) ||
   r.methods.some(m => m.name.toLowerCase().includes(search)) ||
   (r.interfaceInfo && r.interfaceInfo.category.toLowerCase().includes(search)) ||
   (r.interfaceInfo && r.interfaceInfo.caseId && r.interfaceInfo.caseId.toLowerCase().includes(search))
  );
 }

 list.sort((a, b) => order[a.risk] - order[b.risk]);

 const container = document.getElementById("results");
 if (!list.length) {

window.tryCall = function(objName, idx) {
 const input = document.getElementById(`call-input-${idx}`)?.value || "";
 const resultDiv = document.getElementById(`call-result-${idx}`);
 resultDiv.style.display = "block";
 resultDiv.className = "call-result info";
 resultDiv.textContent = "执行中...";

 setTimeout(() => {
  try {
   const obj = window[objName];
   const type = typeof obj;

   if (type === "function") {
    let args = [];
    if (input.trim()) {
     try { args = [JSON.parse(input)]; } catch { args = [input]; }
    }
    const result = obj.apply(null, args);
    resultDiv.className = "call-result success";
    resultDiv.textContent = `✓ 成功\n返回: ${JSON.stringify(result, null, 2) || String(result)}`;
   } else if (type === "object") {
    resultDiv.className = "call-result info";
    resultDiv.textContent = `对象信息:\n类型: ${type}\n属性: ${Object.keys(obj).length}个\n${JSON.stringify(obj, null, 2).slice(0, 300)}`;
   } else {
    resultDiv.className = "call-result success";
    resultDiv.textContent = `值: ${String(obj)}`;
   }
  } catch(err) {
   resultDiv.className = "call-result error";
   resultDiv.textContent = `✗ 失败: ${err.message}`;
  }
 }, 50);
};

 md += `## 接口详情\n\n`;
 scanResults.forEach(item => {
  md += `### ${item.name} [${item.risk.toUpperCase()}]\n`;
  if (item.interfaceInfo) {
   md += `- 分类: ${item.interfaceInfo.category}\n`;
   md += `- CVSS: ${item.cvss}\n`;
   md += `- 说明: ${item.interfaceInfo.desc}\n`;
  }
  md += `- 方法数: ${item.methods.length}\n`;
  item.methods.forEach(m => {
   md += `  - ${m.name} (${m.risk})${m.interfaceInfo ? ` [${m.interfaceInfo.category}]` : ''}\n`;
  });
  md += `\n`;
 });

 showModal("导出报告", md);
};

window.showModal = function(title, content) {
 document.getElementById("modal-title").textContent = title;
 document.getElementById("modal-body").textContent = content;
 document.getElementById("modal").classList.add("show");
};

window.closeModal = function() {
 document.getElementById("modal").classList.remove("show");
};

window.copyModal = function() {
 const text = document.getElementById("modal-body").textContent;
 navigator.clipboard.writeText(text).then(() => showToast("已复制"));
};

// ===================== 主题切换 =====================
window.toggleTheme = function() {
 const html = document.documentElement;
 const current = html.getAttribute("data-theme");
 html.setAttribute("data-theme", current === "light" ? "dark" : "light");
 localStorage.setItem("jsbridge-theme", html.getAttribute("data-theme"));
};

const savedTheme = localStorage.getItem("jsbridge-theme");
if (savedTheme) document.documentElement.setAttribute("data-theme", savedTheme);

// ===================== Toast =====================
function showToast(msg) {
 const toast = document.getElementById("toast");
 toast.textContent = msg;
 toast.classList.add("show");
 setTimeout(() => toast.classList.remove("show"), 1500);
}

// ===================== 扫描完成 =====================
setTimeout(() => {
 let msg = `扫描完成!\n\n`;
 msg += `接口统计:\n`;
 msg += `- 严重: ${counts.critical}\n`;
 msg += `- 高危: ${counts.high}\n`;
 msg += `- 中危: ${counts.medium}\n`;
 msg += `- 低危: ${counts.low}\n`;
 msg += `- 待确认: ${counts.pending}\n`;
 msg += `- 总计: ${counts.total}\n\n`;
 if (window.detectedCases.length > 0) {
  msg += `匹配漏洞案例: ${window.detectedCases.length}个\n`;
 }
 alert(msg);
}, 100);

})();
</script>
</body>
</html>
