<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>WebView Scanner</title>
<style>
:root {
  --bg: #0f0f23; --card: #1a1a2e; --card-hover: #16213e;
  --text: #eee; --text-dim: #888;
  --blue: #00d4ff; --red: #ff4757; --yellow: #ffa502; --green: #2ed573;
  --purple: #a855f7; --orange: #ff7f50; --critical: #ff0040;
  --font-size-base: 14px;
}
[data-theme="light"] {
  --bg: #f5f5f5; --card: #ffffff; --card-hover: #e8e8e8;
  --text: #222; --text-dim: #666;
}
@media (max-width: 480px) { :root { --font-size-base: 12px; } }
@media (min-width: 800px) { :root { --font-size-base: 16px; } }
* { box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg); color: var(--text); margin: 0; padding: 0;
  font-size: var(--font-size-base); line-height: 1.5;
}
.container { max-width: 1000px; margin: 0 auto; padding: 12px; }

/* 头部 */
.header { text-align: center; padding: 12px 0 8px; }
.header h1 { margin: 0; font-size: 1.4em; color: var(--blue); font-weight: 700; }
.header p { color: var(--text-dim); font-size: 0.8em; margin-top: 4px; }
.theme-toggle { position: absolute; top: 15px; right: 15px; background: var(--card); border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; color: var(--text); font-size: 0.85em; }

/* 存储信息面板 */
.storage-panel { background: var(--card); border-radius: 10px; padding: 12px; margin-bottom: 12px; }
.storage-title { font-size: 0.9em; font-weight: 600; margin-bottom: 10px; color: var(--blue); }
.storage-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 8px; }
.storage-item { padding: 8px; background: var(--bg); border-radius: 6px; }
.storage-label { font-size: 0.7em; color: var(--text-dim); margin-bottom: 4px; }
.storage-value { font-size: 0.75em; word-break: break-all; font-family: monospace; max-height: 60px; overflow: auto; }

/* Bridge调用面板 */
.bridge-panel { background: var(--card); border-radius: 10px; padding: 12px; margin-bottom: 12px; }
.bridge-title { font-size: 0.9em; font-weight: 600; margin-bottom: 10px; color: var(--orange); }
.bridge-row { display: flex; gap: 8px; margin-bottom: 8px; }
.bridge-input { flex: 1; padding: 8px; border: 1px solid var(--card-hover); border-radius: 6px; background: var(--bg); color: var(--text); font-size: 0.85em; font-family: monospace; }
.bridge-btn { padding: 8px 16px; border: none; border-radius: 6px; background: var(--orange); color: #000; font-weight: 600; cursor: pointer; font-size: 0.85em; }
.bridge-presets { display: flex; gap: 6px; flex-wrap: wrap; }
.preset-btn { padding: 6px 10px; border: none; border-radius: 4px; background: var(--bg); color: var(--text); font-size: 0.75em; cursor: pointer; }
.bridge-result { margin-top: 10px; padding: 8px; border-radius: 6px; font-size: 0.75em; font-family: monospace; white-space: pre-wrap; word-break: break-all; max-height: 150px; overflow: auto; background: var(--bg); display: none; }
.bridge-logs { margin-top: 8px; max-height: 100px; overflow: auto; font-size: 0.7em; background: var(--bg); border-radius: 6px; padding: 6px; }

/* 评分面板 */
.score-panel { background: var(--card); border-radius: 10px; padding: 12px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
.score-circle { width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8em; font-weight: bold; }
.score-info h3 { margin: 0 0 4px; font-size: 0.95em; }
.score-info p { margin: 0; font-size: 0.75em; color: var(--text-dim); }

/* 统计 */
.stats { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
.stat-box { flex: 1; min-width: 55px; background: var(--card); padding: 8px 5px; border-radius: 8px; text-align: center; cursor: pointer; }
.stat-box .count { font-size: 1.3em; font-weight: bold; display: block; }
.stat-box .label { font-size: 0.65em; color: var(--text-dim); }
.stat-box.high .count { color: var(--red); }
.stat-box.medium .count { color: var(--yellow); }
.stat-box.low .count { color: var(--green); }
.stat-box.pending .count { color: var(--purple); }
.stat-box.total .count { color: var(--blue); }

/* 搜索 */
.search-box { margin-bottom: 10px; display: flex; gap: 6px; }
.search-input { flex: 1; padding: 10px; border: 2px solid var(--card); border-radius: 6px; background: var(--card); color: var(--text); font-size: 0.95em; outline: none; }
.search-input:focus { border-color: var(--blue); }

/* 工具栏 */
.toolbar { display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; }
.tool-btn { padding: 8px 12px; border: none; border-radius: 5px; background: var(--card); color: var(--text); font-size: 0.8em; cursor: pointer; }
.tool-btn.primary { background: var(--blue); color: #000; }

/* 接口列表 */
.results { margin-bottom: 15px; }
.item { background: var(--card); border-radius: 8px; margin-bottom: 6px; overflow: hidden; border-left: 3px solid transparent; }
.item.high { border-left-color: var(--red); }
.item.medium { border-left-color: var(--yellow); }
.item.low { border-left-color: var(--green); }
.item.pending { border-left-color: var(--purple); }
.item:hover { background: var(--card-hover); }

.item-header { padding: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
.item-name { font-weight: 600; font-size: 0.92em; }
.item-type { color: var(--text-dim); font-size: 0.65em; background: var(--bg); padding: 1px 4px; border-radius: 3px; margin-left: 4px; }
.item-category { color: var(--blue); font-size: 0.65em; margin-left: 6px; }
.item-right { display: flex; align-items: center; gap: 5px; }
.risk-tag { padding: 2px 6px; border-radius: 10px; font-size: 0.6em; font-weight: bold; }
.risk-tag.high { background: var(--red); color: #fff; }
.risk-tag.medium { background: var(--yellow); color: #000; }
.risk-tag.low { background: var(--green); color: #000; }
.risk-tag.pending { background: var(--purple); color: #fff; }
.arrow { font-size: 0.65em; color: var(--text-dim); transition: transform 0.2s; }
.item.expanded .arrow { transform: rotate(180deg); }

.item-body { display: none; padding: 0 10px 10px; border-top: 1px solid var(--card-hover); }
.item.expanded .item-body { display: block; }

.item-info { padding: 8px; background: rgba(0,212,255,0.08); border-radius: 6px; margin-bottom: 8px; font-size: 0.78em; }
.item-info-title { color: var(--blue); font-weight: 600; margin-bottom: 3px; }
.item-info-desc { color: var(--text-dim); }

.method-list { max-height: 250px; overflow-y: auto; }
.method-item { padding: 5px 6px; background: var(--bg); border-radius: 4px; margin-bottom: 3px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; cursor: pointer; }
.method-item:hover { background: var(--card-hover); }
.method-type { font-size: 0.6em; padding: 1px 4px; border-radius: 3px; background: var(--purple); color: #fff; }
.method-type.function { background: var(--blue); color: #000; }
.method-name { font-family: monospace; font-size: 0.78em; }
.method-category { font-size: 0.6em; color: var(--text-dim); }
.method-btn { padding: 2px 6px; border: none; border-radius: 3px; font-size: 0.65em; cursor: pointer; background: var(--card-hover); color: var(--text); }

/* 调用面板 */
.call-panel { margin-top: 8px; background: var(--bg); border-radius: 6px; padding: 8px; }
.call-title { font-size: 0.8em; font-weight: 600; margin-bottom: 6px; color: var(--blue); }
.call-row { display: flex; gap: 5px; margin-bottom: 6px; }
.call-input { flex: 1; padding: 6px; border: 1px solid var(--card); border-radius: 4px; background: var(--card); color: var(--text); font-size: 0.78em; font-family: monospace; }
.call-btn { padding: 6px 10px; border: none; border-radius: 4px; background: var(--blue); color: #000; font-weight: 600; cursor: pointer; font-size: 0.75em; }
.call-result { margin-top: 6px; padding: 6px; border-radius: 4px; font-size: 0.7em; font-family: monospace; white-space: pre-wrap; word-break: break-all; max-height: 120px; overflow: auto; display: none; }
.call-result.success { background: rgba(46,213,115,0.1); border-left: 2px solid var(--green); }
.call-result.error { background: rgba(255,71,87,0.1); border-left: 2px solid var(--red); }

/* Modal */
.modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; padding: 15px; }
.modal.show { display: flex; }
.modal-content { background: var(--card); border-radius: 10px; padding: 15px; max-width: 750px; width: 100%; max-height: 85vh; overflow: auto; }
.modal-title { font-size: 1.05em; font-weight: 600; margin-bottom: 10px; }
.modal-body { font-size: 0.72em; font-family: monospace; background: var(--bg); padding: 10px; border-radius: 6px; white-space: pre-wrap; word-break: break-all; max-height: 58vh; overflow: auto; }
.modal-btn { width: 100%; padding: 10px; border: none; border-radius: 6px; font-size: 0.85em; font-weight: 600; cursor: pointer; margin-top: 6px; }
.modal-btn.primary { background: var(--blue); color: #000; }
.modal-btn.secondary { background: var(--card-hover); color: var(--text); }

.toast { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); background: var(--card); color: var(--text); padding: 8px 16px; border-radius: 14px; font-size: 0.85em; z-index: 2000; opacity: 0; transition: opacity 0.3s; max-width: 90%; text-align: center; }
.toast.show { opacity: 1; }
.empty { text-align: center; color: var(--text-dim); padding: 20px; font-size: 0.9em; }
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()">🌓 切换主题</button>
<div class="container">
<div class="header">
<h1>WebView Scanner</h1>
<p>非浏览器原生属性检测 | 接口分类 | 风险评估</p>
</div>

<!-- 存储信息面板 -->
<div class="storage-panel">
<div class="storage-title">📦 存储与环境信息</div>
<div class="storage-grid">
<div class="storage-item">
<div class="storage-label">Cookie</div>
<div class="storage-value" id="cookie-value">检测中...</div>
</div>
<div class="storage-item">
<div class="storage-label">LocalStorage</div>
<div class="storage-value" id="localstorage-value">检测中...</div>
</div>
<div class="storage-item">
<div class="storage-label">UserAgent</div>
<div class="storage-value" id="ua-value">检测中...</div>
</div>
<div class="storage-item">
<div class="storage-label">URL</div>
<div class="storage-value" id="url-value">检测中...</div>
</div>
</div>
</div>

<!-- Bridge快速调用 -->
<div class="bridge-panel">
<div class="bridge-title">🔧 Bridge URL 快速调用</div>
<div class="bridge-row">
<input type="text" class="bridge-input" id="bridge-url" placeholder="输入 bridge URL，如: jsbridge://getUserInfo?{}">
<button class="bridge-btn" onclick="callBridgeUrl()">调用</button>
</div>
<div class="bridge-presets">
<button class="preset-btn" onclick="setBridgePreset('jsbridge://')">jsbridge://</button>
<button class="preset-btn" onclick="setBridgePreset('iosbridge://getUserInfo?{}')">iOS getUserInfo</button>
<button class="preset-btn" onclick="setBridgePreset('intent://')">intent://</button>
<button class="preset-btn" onclick="setBridgePreset('app://')">app://</button>
</div>
<div class="bridge-result" id="bridge-result"></div>
<div class="bridge-logs" id="bridge-logs"></div>
</div>

<!-- 评分面板 -->
<div class="score-panel" id="score-panel"></div>

<!-- 统计 -->
<div class="stats" id="stats"></div>

<!-- 搜索 -->
<div class="search-box">
<input type="text" class="search-input" id="search" placeholder="搜索接口、方法或分类..." oninput="applySearch()">
</div>

<!-- 工具栏 -->
<div class="toolbar">
<button class="tool-btn" onclick="expandAll()">展开全部</button>
<button class="tool-btn" onclick="collapseAll()">折叠全部</button>
<button class="tool-btn" onclick="exportJSON()">导出JSON</button>
<button class="tool-btn" onclick="exportCSV()">导出CSV</button>
<button class="tool-btn" onclick="exportReport()">导出报告</button>
<button class="tool-btn primary" onclick="location.reload()">重新扫描</button>
</div>

<div class="results" id="results"></div>
</div>

<!-- Modal -->
<div class="modal" id="modal">
<div class="modal-content">
<div class="modal-title" id="modal-title"></div>
<div class="modal-body" id="modal-body"></div>
<button class="modal-btn primary" onclick="copyModal()">复制</button>
<button class="modal-btn secondary" onclick="closeModal()">关闭</button>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
// ===================== 接口功能知识库 (用于风险识别) =====================
const INTERFACE_KNOWLEDGE = {
  // 高危
  exec: { category: "代码执行", desc: "可能执行任意代码", riskLevel: "high", cvss: 9.8,
    keywords: ["exec", "eval", "shell", "cmd", "execute", "runcommand", "invoke", "runtime", "system"] },
  payment: { category: "支付", desc: "涉及支付操作", riskLevel: "high", cvss: 8.2,
    keywords: ["pay", "payment", "alipay", "wxpay", "tradepay", "dopay", "startpay", "wallet"] },
  sms: { category: "短信", desc: "发送短信风险", riskLevel: "high", cvss: 8.5,
    keywords: ["sendsms", "sms", "sendsmessage", "smsmanager", "sendtext"] },
  app: { category: "应用管理", desc: "安装/卸载/跳转应用", riskLevel: "high", cvss: 9.0,
    keywords: ["install", "installapp", "installapk", "uninstall", "launchapp", "openapp", "downloadapk", "jumpTo", "jump", "startActivity", "openother", "jumpother"] },
  contact: { category: "通讯录", desc: "访问通讯录", riskLevel: "high", cvss: 7.5,
    keywords: ["contact", "addressbook", "getcontacts", "contacts", "showaddressbook"] },
  file: { category: "文件操作", desc: "读写文件", riskLevel: "high", cvss: 8.0,
    keywords: ["readfile", "writefile", "getfile", "savefile", "openfile", "downloadfile", "deletefile", "uploadfile"] },
  navigation: { category: "URL/导航", desc: "打开URL跳转", riskLevel: "high", cvss: 7.8,
    keywords: ["openurl", "loadurl", "openlink", "openweb", "startactivity", "openpage", "intent", "navigate"] },
  auth: { category: "登录授权", desc: "第三方登录授权", riskLevel: "high", cvss: 8.0,
    keywords: ["loginauth", "wxlogin", "auth", "oauth", "login", "signin", "token"] },

  // 中危
  location: { category: "定位", desc: "获取GPS位置", riskLevel: "medium", cvss: 5.9,
    keywords: ["location", "getlocation", "geolocation", "gps", "position", "getposition"] },
  device: { category: "设备信息", desc: "获取设备标识", riskLevel: "medium", cvss: 5.3,
    keywords: ["device", "deviceid", "imei", "imsi", "mac", "androidid", "uuid", "getdevice", "serial", "getDeviceInfo", "softwareType"] },
  userinfo: { category: "用户信息", desc: "获取用户信息", riskLevel: "medium", cvss: 5.5,
    keywords: ["userinfo", "getuser", "userprofile", "getprofile", "account", "loginuser", "getUser"] },
  clipboard: { category: "剪贴板", desc: "读写剪贴板", riskLevel: "medium", cvss: 4.5,
    keywords: ["clipboard", "copy", "paste", "setclipboard", "getclipboard"] },
  audio: { category: "音频", desc: "录音功能", riskLevel: "medium", cvss: 5.0,
    keywords: ["audio", "record", "voice", "microphone", "startrecord", "stoprecord"] },
  network: { category: "网络请求", desc: "发起网络请求", riskLevel: "medium", cvss: 4.8,
    keywords: ["request", "fetch", "ajax", "http", "upload", "httprequest", "baseUrl", "baseurl", "dl"] },
  storage_api: { category: "存储接口", desc: "读写数据接口", riskLevel: "medium", cvss: 4.0,
    keywords: ["put", "get", "setdata", "getdata", "savedata", "setStorage", "getStorage"] },
  sign: { category: "签到", desc: "签到相关功能", riskLevel: "medium", cvss: 3.5,
    keywords: ["sign", "cmbSign", "gosign"] },

  // 低危
  camera: { category: "相机/图片", desc: "调用摄像头", riskLevel: "low", cvss: 2.5,
    keywords: ["camera", "photo", "takephoto", "chooseimage", "selectimage", "openCamera"] },
  album: { category: "相册", desc: "访问相册", riskLevel: "low", cvss: 2.0,
    keywords: ["album", "gallery", "picture", "saveimage", "previewimage"] },
  notification: { category: "通知", desc: "发送通知", riskLevel: "low", cvss: 1.5,
    keywords: ["notification", "toast", "alert", "showtoast", "push", "showPolicyAlert", "showPolicyVC"] },
  share: { category: "分享", desc: "分享内容", riskLevel: "low", cvss: 1.0,
    keywords: ["share", "shareto", "sharelink", "socialshare", "goShare", "sharelx"] },
  scan: { category: "扫码", desc: "调用扫码", riskLevel: "low", cvss: 1.5,
    keywords: ["scan", "qrcode", "barcode", "scancode", "goScanQRCode"] },
  keyboard: { category: "键盘", desc: "键盘控制", riskLevel: "low", cvss: 1.0,
    keywords: ["keyboard", "showKeyboard", "hideKeyboard", "softInput"] },
  ui: { category: "界面控制", desc: "界面元素控制", riskLevel: "low", cvss: 1.0,
    keywords: ["statusbar", "setStatusBar", "webheight", "getWebHeight", "screen", "setTakeScreenTip", "tip"] },
  policy: { category: "隐私政策", desc: "显示隐私政策", riskLevel: "low", cvss: 0.5,
    keywords: ["policy", "privacy", "agreement"] },
  permission: { category: "权限", desc: "请求权限", riskLevel: "low", cvss: 1.0,
    keywords: ["permission", "requestpermission", "checkpermission", "requestauth"] },
  biometric: { category: "生物识别", desc: "指纹/面容", riskLevel: "low", cvss: 0.5,
    keywords: ["fingerprint", "faceid", "touchid", "biometric"] }
};

// ===================== 初始化存储信息 =====================
function initStorageInfo() {
  try { document.getElementById("cookie-value").textContent = document.cookie || "(空)"; }
  catch(e) { document.getElementById("cookie-value").textContent = "(无法访问)"; }
  try { var lsKeys = Object.keys(localStorage); document.getElementById("localstorage-value").textContent = lsKeys.length > 0 ? lsKeys.join(", ") : "(空)"; }
  catch(e) { document.getElementById("localstorage-value").textContent = "(无法访问)"; }
  document.getElementById("ua-value").textContent = navigator.userAgent.substring(0, 60) + "...";
  document.getElementById("url-value").textContent = location.href.substring(0, 60) + (location.href.length > 60 ? "..." : "");
}
initStorageInfo();

// ===================== Bridge URL 调用 (增强版) =====================
var bridgeLogs = [];
var bridgeCallbackId = 0;

function addBridgeLog(type, msg) {
  var time = new Date().toLocaleTimeString();
  bridgeLogs.unshift({ time: time, type: type, msg: msg });
  if (bridgeLogs.length > 15) bridgeLogs.pop();
  renderBridgeLogs();
}

function renderBridgeLogs() {
  var logDiv = document.getElementById("bridge-logs");
  logDiv.innerHTML = bridgeLogs.map(function(log) {
    var color = log.type === "error" ? "var(--red)" :
                log.type === "success" ? "var(--green)" :
                log.type === "callback" ? "var(--blue)" : "var(--text)";
    return '<div style="color:' + color + ';padding:3px 0;border-bottom:1px solid var(--card-hover);">' +
           '<span style="color:var(--text-dim)">[' + log.time + ']</span> ' + log.msg + '</div>';
  }).join("");
}

window.setBridgePreset = function(url) {
  document.getElementById("bridge-url").value = url;
};

window.callBridgeUrl = function() {
  var url = document.getElementById("bridge-url").value.trim();
  if (!url) { showToast("请输入 Bridge URL"); return; }
  var resultDiv = document.getElementById("bridge-result");
  resultDiv.style.display = "block";
  resultDiv.innerHTML = "⏳ 正在调用...";
  addBridgeLog("info", "开始: " + url);
  bridgeCallbackId++;
  var cbName = "_bridgeCb_" + bridgeCallbackId;
  window[cbName] = function(data) {
    var str;
    try { str = typeof data === "object" ? JSON.stringify(data, null, 2) : String(data); }
    catch(e) { str = String(data); }
    addBridgeLog("success", "✅ 原生回调: " + (str.length > 50 ? str.substring(0, 50) + "..." : str));
    resultDiv.innerHTML = '<b style="color:var(--green)">✅ 成功响应:</b>\n' + str;
    delete window[cbName];
  };
  var timeout = setTimeout(function() {
    if (window[cbName]) {
      addBridgeLog("error", "⏱️ 超时(5秒)");
      resultDiv.innerHTML = '<b style="color:var(--yellow)">⏱️ 超时</b>\n可能原因: Bridge不存在 / 原生未响应';
      delete window[cbName];
    }
  }, 5000);
  var pmHandler = function(e) {
    addBridgeLog("callback", "📨 postMessage: " + JSON.stringify(e.data).substring(0, 80));
    resultDiv.innerHTML = '<b style="color:var(--blue)">📨 postMessage:</b>\n' + JSON.stringify(e.data, null, 2);
    clearTimeout(timeout);
  };
  window.addEventListener("message", pmHandler);
  try {
    var urlWithCb = url;
    if (url.indexOf("callback") === -1) {
      urlWithCb = url + (url.indexOf("?") === -1 ? "?" : "&") + "callback=" + cbName;
    }
    if (url.startsWith("intent://") || url.startsWith("jsbridge://") || url.startsWith("iosbridge://") || url.startsWith("app://")) {
      var iframe = document.createElement("iframe");
      iframe.style.display = "none";
      iframe.src = urlWithCb;
      document.body.appendChild(iframe);
      addBridgeLog("info", "📦 iframe: " + urlWithCb);
      setTimeout(function() { try { document.body.removeChild(iframe); } catch(e) {} }, 3000);
      resultDiv.innerHTML = '⏳ 已发送，等待响应...\n\nURL: ' + urlWithCb + '\n回调: ' + cbName;
    } else {
      location.href = urlWithCb;
      addBridgeLog("info", "🔗 跳转: " + urlWithCb);
      clearTimeout(timeout);
    }
  } catch(e) {
    addBridgeLog("error", "❌ 失败: " + e.message);
    resultDiv.innerHTML = '<b style="color:var(--red)">❌ 失败:</b>\n' + e.message;
    clearTimeout(timeout);
  }
};

// ===================== 获取非原生属性 (iframe对比法) =====================
function getInjectedProps() {
  try {
    // 创建干净的 iframe 获取原生 window 属性
    var iframe = document.createElement("iframe");
    iframe.style.display = "none";
    iframe.src = "about:blank";
    document.body.appendChild(iframe);
    
    var cleanWindow = iframe.contentWindow;
    var currentProps = Object.keys(window);
    var cleanProps = Object.keys(cleanWindow);
    
    // 找出当前 window 有但干净 window 没有的属性
    var result = currentProps.filter(function(prop) {
      return cleanProps.indexOf(prop) === -1;
    });
    
    document.body.removeChild(iframe);
    return result;
  } catch(e) {
    // 如果 iframe 方法失败，使用白名单作为后备
    console.log("iframe方法失败，使用白名单:", e.message);
    var whitelist = [
      "window","self","document","name","location","history","navigator","customElements",
      "locationbar","menubar","personalbar","scrollbars","statusbar","toolbar","status",
      "closed","frames","length","top","opener","parent","frameElement","origin","external",
      "screen","innerWidth","innerHeight","scrollX","pageXOffset","scrollY","pageYOffset",
      "visualViewport","screenX","screenY","outerWidth","outerHeight","devicePixelRatio",
      "clientInformation","screenLeft","screenTop","styleMedia","isSecureContext","performance",
      "crypto","indexedDB","sessionStorage","localStorage","caches","cookieStore","chrome",
      "scheduler","speechSynthesis","trustedTypes","launchQueue","crossOriginIsolated",
      "originAgentCluster","credentialless","orientation","applicationCache","InstallTrigger"
    ];
    var result = [];
    for (var key in window) {
      if (whitelist.indexOf(key) === -1 && key.indexOf("on") !== 0 && key.indexOf("webkit") !== 0) {
        result.push(key);
      }
    }
    return result;
  }
}

// ===================== 识别接口类型 =====================
function identifyInterface(name) {
  var str = name.toLowerCase();
  for (var key in INTERFACE_KNOWLEDGE) {
    var info = INTERFACE_KNOWLEDGE[key];
    for (var i = 0; i < info.keywords.length; i++) {
      if (str.indexOf(info.keywords[i].toLowerCase()) !== -1) {
        return { category: info.category, riskLevel: info.riskLevel, cvss: info.cvss, desc: info.desc, matchedKeyword: info.keywords[i] };
      }
    }
  }
  return null; // 未识别，返回 null 表示待确认
}

// ===================== CVSS评分 =====================
function getCVSSSeverity(score) {
  if (score >= 9) return { level: "critical", label: "严重", color: "var(--critical)" };
  if (score >= 7) return { level: "high", label: "高危", color: "var(--red)" };
  if (score >= 4) return { level: "medium", label: "中危", color: "var(--yellow)" };
  if (score > 0) return { level: "low", label: "低危", color: "var(--green)" };
  return { level: "none", label: "无风险", color: "var(--blue)" };
}

// ===================== 扫描执行 =====================
// 工具自身定义的函数，需要排除
var TOOL_FUNCTIONS = ["setBridgePreset", "callBridgeUrl", "addBridgeLog", "renderBridgeLogs", "toggleItem", "expandAll", "collapseAll", "tryCall", "tryMethod", "copyText", "exportJSON", "exportCSV", "exportReport", "showModal", "closeModal", "copyModal", "showToast", "toggleTheme", "filterByRisk", "applySearch", "renderResults"];

var injectedProps = getInjectedProps().filter(function(p) {
  return TOOL_FUNCTIONS.indexOf(p) === -1;
});
var scanResults = [];
var totalCVSS = 0;

for (var i = 0; i < injectedProps.length; i++) {
  var key = injectedProps[i];
  var obj = window[key];
  var type = typeof obj;

  // 只处理对象和函数
  if (type !== "object" && type !== "function") continue;

  var methods = [];
  var objInfo = identifyInterface(key);
  var maxRisk = objInfo ? objInfo.riskLevel : "pending";

  if (obj) {
    for (var prop in obj) {
      try {
        var propType = typeof obj[prop];
        var propInfo = identifyInterface(prop);
        var propRisk = propInfo ? propInfo.riskLevel : "pending";

        var levelOrder = { high: 0, medium: 1, low: 2, pending: 3 };
        if (levelOrder[propRisk] < levelOrder[maxRisk]) maxRisk = propRisk;

        methods.push({ name: prop, type: propType, risk: propRisk, interfaceInfo: propInfo });
      } catch(e) {}
    }
  }

  scanResults.push({ name: key, type: type, risk: maxRisk, methods: methods, interfaceInfo: objInfo });
}

// 排序
var order = { high: 0, medium: 1, low: 2, pending: 3 };
scanResults.sort(function(a, b) { return order[a.risk] - order[b.risk]; });

// 计算总CVSS
for (var i = 0; i < scanResults.length; i++) {
  var item = scanResults[i];
  if (item.interfaceInfo && item.interfaceInfo.cvss > totalCVSS) totalCVSS = item.interfaceInfo.cvss;
  for (var j = 0; j < item.methods.length; j++) {
    if (item.methods[j].interfaceInfo && item.methods[j].interfaceInfo.cvss > totalCVSS) {
      totalCVSS = item.methods[j].interfaceInfo.cvss;
    }
  }
}

// 统计
var counts = { high: 0, medium: 0, low: 0, pending: 0, total: scanResults.length };
for (var i = 0; i < scanResults.length; i++) {
  counts[scanResults[i].risk]++;
}

window.scanResults = scanResults;
window.counts = counts;

// ===================== 渲染评分面板 =====================
var severity = getCVSSSeverity(totalCVSS);
var safePercent = Math.max(0, 100 - totalCVSS * 10);
document.getElementById("score-panel").innerHTML =
  '<div class="score-circle" style="background: conic-gradient(' + severity.color + ' ' + (totalCVSS * 36) + 'deg, var(--card-hover) 0deg);">' + totalCVSS.toFixed(1) + '</div>' +
  '<div class="score-info">' +
  '<h3>CVSS 风险评分: ' + severity.label + '</h3>' +
  '<p>检测到 ' + counts.total + ' 个接口，高危 ' + counts.high + '，中危 ' + counts.medium + '，待确认 ' + counts.pending + '</p>' +
  '<p>安全系数: ' + safePercent.toFixed(0) + '%</p>' +
  '</div>';

// ===================== 渲染统计 =====================
document.getElementById("stats").innerHTML =
  '<div class="stat-box total" onclick="filterByRisk(\'all\')"><span class="count">' + counts.total + '</span><span class="label">总计</span></div>' +
  '<div class="stat-box high" onclick="filterByRisk(\'high\')"><span class="count">' + counts.high + '</span><span class="label">高危</span></div>' +
  '<div class="stat-box medium" onclick="filterByRisk(\'medium\')"><span class="count">' + counts.medium + '</span><span class="label">中危</span></div>' +
  '<div class="stat-box low" onclick="filterByRisk(\'low\')"><span class="count">' + counts.low + '</span><span class="label">低危</span></div>' +
  '<div class="stat-box pending" onclick="filterByRisk(\'pending\')"><span class="count">' + counts.pending + '</span><span class="label">待确认</span></div>';

// ===================== 渲染列表 =====================
var currentFilter = "all";
renderResults(currentFilter);

function renderResults(filter) {
  currentFilter = filter;
  var list = filter === "all" ? scanResults.slice() : scanResults.filter(function(r) { return r.risk === filter; });

  var search = document.getElementById("search").value.toLowerCase();
  if (search) {
    list = list.filter(function(r) {
      return r.name.toLowerCase().indexOf(search) !== -1 ||
             r.methods.some(function(m) { return m.name.toLowerCase().indexOf(search) !== -1; }) ||
             (r.interfaceInfo && r.interfaceInfo.category.toLowerCase().indexOf(search) !== -1);
    });
  }

  list.sort(function(a, b) { return order[a.risk] - order[b.risk]; });

  var container = document.getElementById("results");
  if (!list.length) {
    container.innerHTML = '<div class="empty">没有找到匹配的接口</div>';
    return;
  }

  var html = "";
  for (var idx = 0; idx < list.length; idx++) {
    var item = list[idx];
    html += '<div class="item ' + item.risk + '" data-idx="' + idx + '">';
    html += '<div class="item-header" onclick="toggleItem(' + idx + ')">';
    html += '<div>';
    html += '<span class="item-name">' + item.name + '</span>';
    html += '<span class="item-type">' + item.type + '</span>';
    if (item.interfaceInfo) {
      html += '<span class="item-category">[' + item.interfaceInfo.category + ']</span>';
    }
    html += '</div>';
    html += '<div class="item-right">';
    html += '<span class="risk-tag ' + item.risk + '">' + (item.risk === "pending" ? "待确认" : item.risk.toUpperCase()) + '</span>';
    html += '<span class="arrow">▼</span>';
    html += '</div></div>';
    html += '<div class="item-body">';

    if (item.interfaceInfo) {
      html += '<div class="item-info">';
      html += '<div class="item-info-title">📌 ' + item.interfaceInfo.category + '</div>';
      html += '<div class="item-info-desc">' + item.interfaceInfo.desc + ' (CVSS: ' + item.interfaceInfo.cvss + ')</div>';
      html += '</div>';
    } else {
      html += '<div class="item-info">';
      html += '<div class="item-info-title">❓ 待确认</div>';
      html += '<div class="item-info-desc">未在知识库中找到匹配，需人工分析</div>';
      html += '</div>';
    }

    if (item.methods.length > 0) {
      html += '<div class="method-list">';
      for (var mIdx = 0; mIdx < item.methods.length; mIdx++) {
        var m = item.methods[mIdx];
        html += '<div class="method-item" onclick="tryMethod(\'' + item.name + '\', \'' + m.name + '\')">';
        html += '<span class="method-type' + (m.type === "function" ? " function" : "") + '">' + m.type + '</span>';
        html += '<span class="method-name">' + m.name + '</span>';
        if (m.interfaceInfo) {
          html += '<span class="method-category">[' + m.interfaceInfo.category + ']</span>';
        }
        if (m.risk !== "low" && m.risk !== "pending") {
          html += '<span class="risk-tag ' + m.risk + '">' + m.risk + '</span>';
        }
        html += '</div>';
      }
      html += '</div>';
    }

    // 调用面板
    html += '<div class="call-panel">';
    html += '<div class="call-title">🔧 快速调用</div>';
    html += '<div class="call-row">';
    html += '<input type="text" class="call-input" id="call-input-' + idx + '" placeholder="参数 (JSON或字符串)">';
    html += '<button class="call-btn" onclick="tryCall(\'' + item.name + '\', ' + idx + ')">执行</button>';
    html += '</div>';
    html += '<div class="call-result" id="call-result-' + idx + '"></div>';
    html += '</div>';

    html += '</div></div>';
  }
  container.innerHTML = html;
}

window.renderResults = renderResults;

window.filterByRisk = function(risk) {
  document.getElementById("search").value = "";
  renderResults(risk);
};

window.applySearch = function() {
  renderResults(currentFilter);
};

window.toggleItem = function(idx) {
  var items = document.querySelectorAll(".item");
  for (var i = 0; i < items.length; i++) {
    if (items[i].getAttribute("data-idx") == idx) {
      items[i].classList.toggle("expanded");
      break;
    }
  }
};

window.expandAll = function() {
  var items = document.querySelectorAll(".item");
  for (var i = 0; i < items.length; i++) items[i].classList.add("expanded");
};

window.collapseAll = function() {
  var items = document.querySelectorAll(".item");
  for (var i = 0; i < items.length; i++) items[i].classList.remove("expanded");
};

// 点击方法名直接尝试执行
window.tryMethod = function(objName, methodName) {
  try {
    var obj = window[objName];
    var result;
    if (typeof obj[methodName] === "function") {
      result = obj[methodName]();
    } else {
      result = obj[methodName];
    }
    var resultStr;
    try { resultStr = typeof result === "object" ? JSON.stringify(result, null, 2) : String(result); }
    catch(e) { resultStr = String(result); }
    showModal(objName + "." + methodName + "()", resultStr || "(无返回值)");
    addBridgeLog("success", "执行 " + objName + "." + methodName + ": " + (resultStr ? resultStr.substring(0, 50) : "无返回"));
  } catch(e) {
    showModal(objName + "." + methodName + "() 执行失败", e.message);
    addBridgeLog("error", "执行失败: " + e.message);
  }
};

window.tryCall = function(name, idx) {
  var input = document.getElementById("call-input-" + idx);
  var inputValue = input ? input.value : "";
  var resultDiv = document.getElementById("call-result-" + idx);
  resultDiv.style.display = "block";

  try {
    var obj = window[name];
    if (typeof obj !== "function" && typeof obj !== "object") {
      resultDiv.innerHTML = "不是可调用的对象";
      return;
    }

    var result;
    if (typeof obj === "function") {
      var args = [];
      if (inputValue.trim()) {
        try { args = [JSON.parse(inputValue)]; }
        catch(e) { args = [inputValue]; }
      }
      result = obj.apply(null, args);
    } else {
      result = obj;
    }

    var resultStr;
    try { resultStr = typeof result === "object" ? JSON.stringify(result, null, 2) : String(result); }
    catch(e) { resultStr = String(result); }

    resultDiv.className = "call-result success";
    resultDiv.innerHTML = "✅ " + (resultStr || "(无返回值)");
    addBridgeLog("success", name + " 调用成功");
  } catch(e) {
    resultDiv.className = "call-result error";
    resultDiv.innerHTML = "❌ " + e.message;
    addBridgeLog("error", name + " 调用失败: " + e.message);
  }
};

window.copyText = function(text) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text);
  } else {
    var ta = document.createElement("textarea");
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
  }
  showToast("已复制: " + text);
};

// ===================== 导出功能 =====================
window.exportJSON = function() {
  var data = { scanTime: new Date().toISOString(), userAgent: navigator.userAgent, url: location.href, results: scanResults, counts: counts };
  showModal("导出 JSON", JSON.stringify(data, null, 2));
};

window.exportCSV = function() {
  var csv = "对象名,类型,风险等级,方法名,方法类型,方法风险,分类\n";
  for (var i = 0; i < scanResults.length; i++) {
    var item = scanResults[i];
    if (item.methods.length === 0) {
      csv += item.name + "," + item.type + "," + item.risk + ",,,," + (item.interfaceInfo ? item.interfaceInfo.category : "") + "\n";
    } else {
      for (var j = 0; j < item.methods.length; j++) {
        var m = item.methods[j];
        csv += item.name + "," + item.type + "," + item.risk + "," + m.name + "," + m.type + "," + m.risk + "," + (m.interfaceInfo ? m.interfaceInfo.category : "") + "\n";
      }
    }
  }
  showModal("导出 CSV", csv);
};

window.exportReport = function() {
  var report = "WebView 安全扫描报告\n";
  report += "==================\n";
  report += "扫描时间: " + new Date().toLocaleString() + "\n";
  report += "URL: " + location.href + "\n";
  report += "UserAgent: " + navigator.userAgent + "\n\n";
  report += "统计:\n";
  report += "- 总计: " + counts.total + "\n";
  report += "- 高危: " + counts.high + "\n";
  report += "- 中危: " + counts.medium + "\n";
  report += "- 低危: " + counts.low + "\n";
  report += "- 待确认: " + counts.pending + "\n\n";
  report += "详细结果:\n";
  report += "------------------\n";
  for (var i = 0; i < scanResults.length; i++) {
    var item = scanResults[i];
    report += "\n[" + item.risk.toUpperCase() + "] " + item.name + " (" + item.type + ")\n";
    if (item.interfaceInfo) {
      report += "  分类: " + item.interfaceInfo.category + " - " + item.interfaceInfo.desc + "\n";
    }
    if (item.methods.length > 0) {
      report += "  方法:\n";
      for (var j = 0; j < item.methods.length; j++) {
        var m = item.methods[j];
        report += "    - " + m.name + " (" + m.type + ")";
        if (m.interfaceInfo) report += " [" + m.interfaceInfo.category + "]";
        report += "\n";
      }
    }
  }
  showModal("导出报告", report);
};

window.showModal = function(title, content) {
  document.getElementById("modal-title").textContent = title;
  document.getElementById("modal-body").textContent = content;
  document.getElementById("modal").classList.add("show");
};

window.closeModal = function() {
  document.getElementById("modal").classList.remove("show");
};

window.copyModal = function() {
  var text = document.getElementById("modal-body").textContent;
  copyText(text);
};

window.showToast = function(msg) {
  var toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.classList.add("show");
  setTimeout(function() { toast.classList.remove("show"); }, 2000);
};

// 主题切换
window.toggleTheme = function() {
  var html = document.documentElement;
  var current = html.getAttribute("data-theme");
  html.setAttribute("data-theme", current === "light" ? "dark" : "light");
  localStorage.setItem("webview-scanner-theme", html.getAttribute("data-theme"));
};

var savedTheme = localStorage.getItem("webview-scanner-theme");
if (savedTheme) document.documentElement.setAttribute("data-theme", savedTheme);

})();
</script>
