<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Ultimate JSBridge Penetration Lab</title>
<style>
    :root {
        --bg: #0a0a10; --card: #13131f; --card-hover: #1c1c2e; --border: #2d2d44;
        --text: #e0e0e0; --text-dim: #8a8a9f;
        --blue: #00e5ff; --red: #ff3366; --yellow: #ffc107; --green: #00e676;
        --purple: #d500f9; --orange: #ff9100;
        --font-base: 13px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; scrollbar-width: thin; scrollbar-color: var(--border) var(--bg); }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace; background: var(--bg); color: var(--text); font-size: var(--font-base); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    
    /* 顶部信息栏 */
    .header { background: var(--card); padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
    .header h1 { font-size: 1.3em; color: var(--blue); text-shadow: 0 0 10px rgba(0,229,255,0.3); margin-bottom: 4px; }
    .header-info { font-size: 0.8em; color: var(--text-dim); }
    .stats-row { display: flex; gap: 15px; }
    .stat-badge { padding: 4px 10px; border-radius: 4px; font-weight: bold; background: var(--bg); border: 1px solid var(--border); }
    
    /* 主体三栏布局 */
    .workspace { display: flex; flex: 1; overflow: hidden; }
    .panel { display: flex; flex-direction: column; background: var(--bg); border-right: 1px solid var(--border); }
    .panel-title { background: var(--card); padding: 10px 15px; font-weight: bold; color: var(--text); border-bottom: 1px solid var(--border); flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; }
    .panel-content { flex: 1; overflow-y: auto; padding: 15px; }
    
    /* 按钮与输入框 */
    .btn { padding: 6px 12px; background: var(--card); border: 1px solid var(--border); color: var(--text); border-radius: 4px; cursor: pointer; transition: all 0.2s; font-size: 0.9em; font-family: monospace; }
    .btn:hover { background: var(--card-hover); border-color: var(--blue); }
    .btn.primary { background: rgba(0, 229, 255, 0.1); border-color: var(--blue); color: var(--blue); }
    .btn.danger { background: rgba(255, 51, 102, 0.1); border-color: var(--red); color: var(--red); }
    .input-base { width: 100%; padding: 8px; background: var(--card); border: 1px solid var(--border); color: var(--text); border-radius: 4px; font-family: monospace; margin-bottom: 10px; outline: none; }
    .input-base:focus { border-color: var(--blue); }

    /* 列表与树状图 */
    .list-item { padding: 10px; background: var(--card); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 8px; cursor: pointer; transition: 0.2s; }
    .list-item:hover, .list-item.active { border-color: var(--blue); background: var(--card-hover); }
    .risk-tag { padding: 2px 6px; border-radius: 3px; font-size: 0.7em; font-weight: bold; margin-left: 6px; color: #fff; }
    .r-crit { background: var(--red); } .r-high { background: var(--orange); } .r-med { background: var(--yellow); color: #000; } .r-low { background: var(--green); color: #000; } .r-none { background: var(--border); }
    
    /* 树形组件 */
    .tree-node { margin-bottom: 4px; }
    .tree-header { display: flex; align-items: center; padding: 4px; border-radius: 4px; cursor: pointer; }
    .tree-header:hover { background: var(--card); }
    .tree-icon { width: 16px; color: var(--text-dim); }
    .tree-key { color: var(--blue); font-weight: bold; margin-right: 8px; }
    .tree-val { color: var(--text-dim); font-size: 0.9em; }
    .action-btn { font-size: 0.7em; padding: 2px 6px; margin-left: auto; background: var(--bg); border: 1px solid var(--border); border-radius: 3px; color: var(--text); cursor: pointer; }
    .action-btn:hover { background: var(--blue); color: #000; }

    /* 终端日志 */
    .terminal { background: #000; border: 1px solid var(--border); border-radius: 6px; padding: 10px; flex: 1; overflow-y: auto; font-family: "Courier New", Courier, monospace; font-size: 0.9em; margin-bottom: 10px; display: flex; flex-direction: column; }
    .log-line { margin-bottom: 4px; word-break: break-all; }
    .log-time { color: var(--text-dim); margin-right: 8px; }
    .log-info { color: var(--green); } .log-warn { color: var(--yellow); } .log-err { color: var(--red); } .log-hook { color: var(--purple); }

    /* 弹窗 */
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
    .modal-content { background: var(--card); border: 1px solid var(--border); border-radius: 8px; width: 100%; max-width: 800px; max-height: 80vh; display: flex; flex-direction: column; }
    .modal-body { padding: 15px; overflow-y: auto; font-family: monospace; white-space: pre-wrap; font-size: 0.9em; }

    @media (max-width: 900px) { .workspace { flex-direction: column; overflow-y: auto; } .panel { border-right: none; border-bottom: 1px solid var(--border); min-height: 400px; flex: none; } }
</style>
</head>
<body>

<div class="header">
    <div>
        <h1>🛡️ Ultimate JSBridge Lab</h1>
        <div class="header-info" id="env-info">探测中...</div>
    </div>
    <div class="stats-row">
        <div class="stat-badge" style="color:var(--blue)">原生对象: <span id="stat-total">0</span></div>
        <div class="stat-badge" style="color:var(--red)">高危漏洞: <span id="stat-high">0</span></div>
        <button class="btn primary" onclick="exportMarkdown()">📄 导出渗透报告</button>
    </div>
</div>

<div class="workspace">
    <div class="panel" style="width: 320px; flex-shrink: 0;">
        <div class="panel-title">
            <span>📦 注入对象池</span>
            <button class="btn" style="padding: 2px 6px; font-size: 0.8em;" onclick="location.reload()">强制刷新</button>
        </div>
        <div class="panel-content" style="display: flex; flex-direction: column;">
            <div id="object-list" style="flex: 1; overflow-y: auto; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px;"></div>
            
            <div style="flex-shrink: 0;">
                <h3 style="color:var(--red); font-size:1em; margin-bottom:10px;">🔥 字典爆破 (Brute Force)</h3>
                <select id="brute-target" class="input-base"></select>
                <button class="btn danger" style="width: 100%;" id="btn-brute" onclick="startBruteForce()">💀 开始隐蔽方法撞库</button>
                <div id="brute-progress" style="margin-top:8px; font-size:0.8em; color:var(--text-dim);">需选中上方列表中的无方法对象进行撞库。</div>
            </div>
        </div>
    </div>

    <div class="panel" style="flex: 1;">
        <div class="panel-title">
            <span>🌳 深度分析与方法调用</span>
            <button class="btn primary" id="btn-hook" onclick="toggleGlobalHook()">🎣 开启全局 API Hook</button>
        </div>
        <div class="panel-content" id="tree-container">
            <div style="color:var(--text-dim); text-align:center; margin-top:50px;">👈 请先在左侧选择一个原生对象</div>
        </div>
    </div>

    <div class="panel" style="width: 350px; flex-shrink: 0;">
        <div class="panel-title"><span>📡 渗透监控终端 (Terminal)</span></div>
        <div class="panel-content" style="display: flex; flex-direction: column;">
            
            <div class="terminal" id="terminal-log"></div>
            
            <div style="flex-shrink: 0;">
                <input type="text" id="exec-path" class="input-base" style="color:var(--green); font-weight:bold;" placeholder="目标路径 (如 window.obj.func)">
                <input type="text" id="exec-params" class="input-base" placeholder='输入参数 (如: {"key":"val"} 或 "123")'>
                <div style="display: flex; gap: 8px; margin-bottom: 10px;">
                    <button class="btn primary" style="flex: 1;" onclick="executeCommand()">⚡ 模拟调用</button>
                    <button class="btn" style="flex: 1;" onclick="testDeeplink()">🔗 盲发 Deeplink</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal" id="report-modal">
    <div class="modal-content">
        <div style="padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items:center;">
            <h2 style="color:var(--blue);margin:0;">渗透测试报告 (Markdown)</h2>
            <div>
                <button class="btn primary" onclick="copyReport()">复制内容</button>
                <button class="btn" onclick="document.getElementById('report-modal').style.display='none'">关闭</button>
            </div>
        </div>
        <div class="modal-body" id="report-body"></div>
    </div>
</div>

<script>
// ==============================================================================
// 核心隔离闭包：保证引擎自身的变量绝对不污染全局 window，杜绝“自己扫自己”
// ==============================================================================
(function() {
    
    // 【核心修复】第 0 毫秒的绝对纯净快照！
    // 此时任何自身的 UI 工具函数（如 window.executeCommand）都还没有挂载！
    const PURE_INJECTED_KEYS = (function() {
        try {
            const iframe = document.createElement("iframe");
            iframe.style.display = "none";
            document.documentElement.appendChild(iframe);
            const cleanKeys = Object.getOwnPropertyNames(iframe.contentWindow);
            const currKeys = Object.getOwnPropertyNames(window);
            iframe.parentNode.removeChild(iframe);
            return currKeys.filter(k => !cleanKeys.includes(k) && !k.startsWith("webkit") && !k.startsWith("on"));
        } catch(e) {
            return Object.keys(window).filter(k => !["window","document","location","navigator","localStorage","sessionStorage","console"].includes(k));
        }
    })();

    // 初始化 UI 日志
    const terminal = document.getElementById('terminal-log');
    function log(msg, type = 'info') {
        const time = new Date().toLocaleTimeString();
        let colorClass = 'log-info';
        if(type === 'warn') colorClass = 'log-warn';
        if(type === 'err') colorClass = 'log-err';
        if(type === 'hook') colorClass = 'log-hook';
        const line = document.createElement('div');
        line.className = `log-line ${colorClass}`;
        line.innerHTML = `<span class="log-time">[${time}]</span> ${msg}`;
        terminal.appendChild(line);
        terminal.scrollTop = terminal.scrollHeight;
    }

    document.getElementById('env-info').innerText = navigator.userAgent;
    log(`环境沙箱加载完毕: ${PURE_INJECTED_KEYS.length} 个非原生对象被捕获。`);

    // --- 漏洞与特征知识库 ---
    const KNOWLEDGE = {
        "exec": { cat: "命令执行", kw: ["exec", "eval", "shell", "invoke", "runtime", "system"], r: "r-crit", desc: "可能执行系统命令" },
        "app": { cat: "应用控制", kw: ["install", "uninstall", "downloadapk", "openapp"], r: "r-crit", desc: "静默安装或拉起恶意应用" },
        "pay": { cat: "支付越权", kw: ["pay", "alipay", "wxpay", "wallet"], r: "r-crit", desc: "未授权拉起支付结算" },
        "contact": { cat: "隐私窃取", kw: ["contact", "addressbook", "showaddressbook"], r: "r-high", desc: "获取用户敏感通讯录数据" },
        "file": { cat: "文件跨域", kw: ["readfile", "writefile", "openfile"], r: "r-high", desc: "读取App私有目录" },
        "auth": { cat: "认证劫持", kw: ["login", "oauth", "token", "signin", "auth"], r: "r-high", desc: "获取或伪造登录凭证" },
        "intent": { cat: "路由逃逸", kw: ["startactivity", "intent", "jumppagepath", "openurl"], r: "r-high", desc: "越权拉起原生组件或URL" },
        "device": { cat: "指纹追踪", kw: ["deviceid", "imei", "mac", "serial"], r: "r-med", desc: "获取设备硬件唯一标识" },
        "storage": { cat: "数据操作", kw: ["storage", "put", "getdata", "setdata"], r: "r-med", desc: "操作本地持久化缓存" },
        "location": { cat: "物理定位", kw: ["location", "gps", "position"], r: "r-med", desc: "获取真实物理坐标" },
        "media": { cat: "媒体硬件", kw: ["camera", "photo", "audio", "record", "speechrecognition"], r: "r-low", desc: "调用摄像头、麦克风等外设" },
        "ui": { cat: "UI交互", kw: ["toast", "alert", "navigation", "airportinterest", "policy"], r: "r-low", desc: "正常的界面展示或提示" }
    };

    function evalRisk(name) {
        const str = name.toLowerCase();
        for (let key in KNOWLEDGE) {
            if (KNOWLEDGE[key].kw.some(kw => str.includes(kw))) return KNOWLEDGE[key];
        }
        return { cat: "未分类自定义方法", r: "r-none", desc: "需人工确认功能" };
    }

    // --- 隐秘方法爆破字典 (应对无暴露方法的 Java 对象) ---
    const BRUTE_DICT = [
        "getUserInfo","getDeviceId","getToken","getAccessToken","login","pay","getLocation","read",
        "write","upload","download","saveImage","openUrl","startActivity","jumpTo","getContacts",
        "getClipboard","invoke","execute","call","postMessage","showAddressBook","canlePrivacyPolicy",
        "callSpeechRecognition","getSimInfo","getImei","getMacAddress","execShell"
    ];

    // JS 原生内部方法黑名单，保持报告纯净
    const IGNORES = ["apply", "bind", "call", "toString", "length", "name", "prototype", "constructor", "caller", "callee"];

    // --- 核心引擎：解析被捕获的纯净数据 ---
    let globalScanData = [];
    let isHooked = false;

    function runAnalysis() {
        let stats = { total: 0, high: 0, med: 0 };

        PURE_INJECTED_KEYS.forEach(key => {
            const obj = window[key];
            const type = typeof obj;
            if(type !== "object" && type !== "function") return;

            let methods = [];
            let maxR = "r-none";
            const objInfo = evalRisk(key);

            if(obj) {
                try {
                    let props = Object.getOwnPropertyNames(obj);
                    const proto = Object.getPrototypeOf(obj);
                    if(proto && proto !== Object.prototype && proto !== Function.prototype) {
                        props = [...new Set([...props, ...Object.getOwnPropertyNames(proto)])];
                    }

                    props.forEach(p => {
                        if(IGNORES.includes(p)) return;
                        const mType = typeof obj[p];
                        const mInfo = evalRisk(p);
                        
                        const levels = {"r-crit": 4, "r-high": 3, "r-med": 2, "r-low": 1, "r-none": 0};
                        if(levels[mInfo.r] > levels[maxR]) maxR = mInfo.r;

                        methods.push({ name: p, type: mType, info: mInfo });
                    });
                } catch(e) {}
            }

            stats.total++;
            if(["r-crit", "r-high"].includes(maxR)) stats.high++;
            if(maxR === "r-med") stats.med++;

            globalScanData.push({ name: key, type: type, info: objInfo, maxRisk: maxR, methods: methods });
        });

        globalScanData.sort((a,b) => {
            const levels = {"r-crit": 0, "r-high": 1, "r-med": 2, "r-low": 3, "r-none": 4};
            return levels[a.maxRisk] - levels[b.maxRisk];
        });

        document.getElementById('stat-total').innerText = stats.total;
        document.getElementById('stat-high').innerText = stats.high;
        document.getElementById('stat-med').innerText = stats.med;

        renderObjectList();
    }

    // --- 渲染 UI ---
    function renderObjectList() {
        const listDiv = document.getElementById('object-list');
        const sel = document.getElementById('brute-target');
        listDiv.innerHTML = "";
        sel.innerHTML = `<option value="">-- 选用目标进行强力爆破 --</option>`;

        globalScanData.forEach((item) => {
            sel.innerHTML += `<option value="${item.name}">window.${item.name}</option>`;
            
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-family:monospace;font-weight:bold;color:var(--blue)">.${item.name}</span>
                    <span class="risk-tag ${item.maxRisk}">${item.info.cat}</span>
                </div>
                <div style="font-size:0.8em;color:var(--text-dim);margin-top:4px;">枚举出子方法: ${item.methods.length} 个</div>
            `;
            div.onclick = () => renderTreeView(item, div);
            listDiv.appendChild(div);
        });
    }

    function renderTreeView(item, domElement) {
        document.querySelectorAll('.list-item').forEach(el => el.classList.remove('active'));
        if(domElement) domElement.classList.add('active');

        const container = document.getElementById('tree-container');
        let html = `<h3 style="color:var(--orange);margin-bottom:10px;border-bottom:1px solid var(--border);padding-bottom:5px;">window.${item.name} <span style="font-size:0.7em;color:var(--text-dim)">[${item.type}]</span></h3>`;
        
        if(item.methods.length === 0) {
            html += `<p style="color:var(--text-dim);line-height:1.6;">⚠️ 此原生对象当前未暴露出任何可被探测的属性。<br>如果确认为 Java 注入的 Bridge，它的方法极有可能被混淆或通过 @JavascriptInterface 保护。<br>👉 <strong style="color:var(--red)">建议在左侧下拉框选中它，使用字典爆破进行强行撞库。</strong></p>`;
        } else {
            item.methods.forEach(m => {
                html += `
                <div class="tree-node">
                    <div class="tree-header">
                        <span class="tree-key">.${m.name}()</span>
                        <span class="tree-val">[${m.type}]</span>
                        ${m.info.r !== 'r-none' ? `<span class="risk-tag ${m.info.r}">${m.info.cat}</span>` : ''}
                        <button class="action-btn" onclick="document.getElementById('exec-path').value='window.${item.name}.${m.name}'; log('已装载调用路径: window.${item.name}.${m.name}', 'warn');">装载至终端</button>
                    </div>
                </div>`;
            });
        }
        container.innerHTML = html;
        document.getElementById('exec-path').value = `window.${item.name}`;
    }

    // ==============================================================================
    // 在纯净扫描完成之后，最后才把需要绑定给 HTML onclick 的工具方法挂载到 window
    // 这样它们绝对不会出现在 PURE_INJECTED_KEYS 里面！
    // ==============================================================================

    runAnalysis(); // 同步执行纯净的数据解析和渲染

    // 1. AOP 拦截器 (Hooking)
    window.toggleGlobalHook = function() {
        const btn = document.getElementById('btn-hook');
        if(isHooked) {
            log('全局 Hook 已就绪，如需卸载请强制刷新页面。', 'warn');
            return;
        }
        
        let hookCount = 0;
        globalScanData.forEach(objData => {
            const target = window[objData.name];
            if(typeof target === 'object' && target !== null) {
                objData.methods.forEach(m => {
                    if(m.type === 'function' && !target[m.name].__hooked) {
                        const original = target[m.name];
                        target[m.name] = function(...args) {
                            const argStr = args.map(a => { try { return JSON.stringify(a); } catch(e){ return String(a); } }).join(', ');
                            log(`[AOP 拦截] 捕获到底层调用: <b>${objData.name}.${m.name}</b>(${argStr})`, 'hook');
                            return original.apply(this, args);
                        };
                        target[m.name].__hooked = true;
                        hookCount++;
                    }
                });
            }
        });
        
        window.addEventListener("message", e => {
            log(`[Window Msg] 捕获到原生异步推送: ${typeof e.data === 'object' ? JSON.stringify(e.data) : e.data}`, 'hook');
        });

        isHooked = true;
        btn.innerText = "🛑 AOP Hook 运行中 (刷新解除)";
        btn.classList.replace('primary', 'danger');
        log(`AOP 切面部署完毕，成功接管了 ${hookCount} 个原生函数的入参监听。`, 'info');
    };

    // 2. 隐蔽字典爆破 (Brute Force)
    window.startBruteForce = function() {
        const targetName = document.getElementById('brute-target').value;
        if(!targetName) { log('撞库中止：请先从下拉框选择一个目标对象。', 'err'); return; }
        
        const targetObj = window[targetName];
        const progDiv = document.getElementById('brute-progress');
        const btn = document.getElementById('btn-brute');
        
        btn.disabled = true;
        let idx = 0; let foundCount = 0;
        log(`💀 发起强力字典撞库: 目标 [window.${targetName}]...`, 'warn');

        let scanItem = globalScanData.find(i => i.name === targetName);
        if(!scanItem) return;

        function step() {
            if(idx >= BRUTE_DICT.length) {
                btn.disabled = false;
                progDiv.innerText = `探测完毕！共撞击 ${BRUTE_DICT.length} 次，逼出 ${foundCount} 个隐藏方法。`;
                log(`🏁 撞库结束。请在中间的树状图面板查看新挖掘出的隐藏接口。`, 'info');
                if(document.getElementById('exec-path').value.includes(targetName)) renderTreeView(scanItem);
                return;
            }

            const testMethod = BRUTE_DICT[idx];
            progDiv.innerText = `探测中: .${testMethod}() [${idx+1}/${BRUTE_DICT.length}]`;

            try {
                if(targetObj[testMethod] !== undefined && !scanItem.methods.some(m => m.name === testMethod)) {
                    foundCount++;
                    const mInfo = evalRisk(testMethod);
                    scanItem.methods.push({ name: testMethod + " [隐蔽被爆破]", type: "function", info: mInfo });
                    log(`🎯 撞库成功: 发现隐藏的底层 API 漏洞点 => .${testMethod}()`, 'hook');
                }
            } catch(e) {
                // Android 容器的安全策略经常会导致未经允许的属性读取抛错，这也侧面证明了它的存在
                if(!scanItem.methods.some(m => m.name === testMethod)) {
                    foundCount++;
                    const mInfo = evalRisk(testMethod);
                    scanItem.methods.push({ name: testMethod + " [越权受保护]", type: "function", info: mInfo });
                    log(`🎯 撞库成功(边界探测): .${testMethod}() 存在，但因权限原因被容器保护。`, 'warn');
                }
            }

            idx++;
            setTimeout(step, 10);
        }
        step();
    };

    // 3. 执行调用与 Scheme 盲发
    window.executeCommand = function() {
        const path = document.getElementById('exec-path').value.replace("window.", "");
        const paramsRaw = document.getElementById('exec-params').value;
        if(!path) return;

        log(`> 主动调用: ${path}( ${paramsRaw} )`);
        try {
            let target = window; let parent = null;
            path.split('.').forEach(p => { parent = target; target = target[p.replace(" [隐蔽被爆破]", "").replace(" [越权受保护]", "")]; });
            
            if(typeof target === 'function') {
                let args = [];
                if(paramsRaw) {
                    try { args = [JSON.parse(paramsRaw)]; } catch(e) { args = [paramsRaw]; }
                }
                const res = target.apply(parent, args);
                log(`<- 返回值: ${res !== undefined ? JSON.stringify(res) : 'undefined'}`, 'info');
            } else {
                log(`<- 该节点为属性变量，当前值: ${JSON.stringify(target)}`, 'info');
            }
        } catch(e) {
            log(`! 执行被阻断: ${e.message}`, 'err');
        }
    };

    window.testDeeplink = function() {
        let url = document.getElementById('exec-params').value.trim() || document.getElementById('exec-path').value.trim();
        if(!url.includes("://")) {
            log("! 格式错误：盲发 Deeplink 必须是完整的 URI (如 intent://xxx 或 custom://xxx)", "err");
            return;
        }
        log(`> 盲发协议探测: ${url}`);
        
        const cbName = "_dlcb_" + Date.now();
        window[cbName] = function(res) { log(`🔥 Native 协议回调 [${cbName}]: ${JSON.stringify(res)}`, "hook"); };
        let finalUrl = url.includes("?") ? `${url}&callback=${cbName}` : `${url}?callback=${cbName}`;

        const iframe = document.createElement("iframe");
        iframe.style.display = "none"; 
        iframe.src = finalUrl;
        document.body.appendChild(iframe);
        setTimeout(() => iframe.parentNode.removeChild(iframe), 2000);
        log(`<- Payload 已经投递，请观察 App 表现或上述的被动 Terminal 监控日志。`, 'warn');
    };

    // 4. Markdown 报告导出
    window.exportMarkdown = function() {
        let md = `# JSBridge 安全渗透测试报告\n\n`;
        md += `> **扫描时间:** ${new Date().toLocaleString()}\n`;
        md += `> **目标页面:** \`${location.href}\`\n`;
        md += `> **User-Agent:** \`${navigator.userAgent}\`\n\n`;

        let crit=0, high=0, med=0, low=0;
        globalScanData.forEach(obj => {
            obj.methods.forEach(m => {
                if(m.info.r === 'r-crit') crit++;
                else if(m.info.r === 'r-high') high++;
                else if(m.info.r === 'r-med') med++;
                else low++;
            });
        });

        md += `## 1. 风险暴露面统计\n`;
        md += `- **严重 (Critical):** ${crit}\n- **高危 (High):** ${high}\n- **中危 (Medium):** ${med}\n- **安全/未知 (Low):** ${low}\n- **总计注入原生对象:** ${globalScanData.length}\n\n`;

        md += `## 2. 匹配的高危漏洞与 PoC\n`;
        let hasVuln = false;
        globalScanData.forEach(obj => {
            obj.methods.forEach(m => {
                if(m.info.r === 'r-crit' || m.info.r === 'r-high') {
                    hasVuln = true;
                    md += `### [${m.info.r === 'r-crit' ? 'CRITICAL' : 'HIGH'}] ${m.info.cat} - 漏洞预警\n`;
                    md += `> 描述: ${m.info.desc}\n\n**利用载荷示例 (PoC):**\n\`\`\`javascript\nwindow.${obj.name}.${m.name.replace(/ \[.*?\]/g, "")}();\n\`\`\`\n\n`;
                }
            });
        });
        if(!hasVuln) md += `*本次自动化扫描暂未发现直接匹配的严重风险规则。*\n\n`;

        md += `## 3. 注入接口详细清单\n`;
        globalScanData.forEach(obj => {
            md += `\n### \`window.${obj.name}\`\n`;
            md += `- **业务分类:** ${obj.info.cat}\n`;
            if(obj.methods.length > 0) {
                md += `- **暴露的方法/属性:**\n`;
                obj.methods.forEach(m => {
                    const riskTag = m.info.r !== 'r-none' && m.info.r !== 'r-low' ? ` **(🚨风险: ${m.info.cat})**` : '';
                    md += `  - \`.${m.name}()\`${riskTag}\n`;
                });
            } else {
                md += `- *(未扫描到暴露的子属性，已被系统标记，可能需使用字典爆破探测)*\n`;
            }
        });

        document.getElementById('report-body').innerText = md;
        document.getElementById('report-modal').style.display = 'flex';
    };

    window.copyReport = function() {
        const text = document.getElementById('report-body').innerText;
        navigator.clipboard.writeText(text).then(() => {
            log('报告 Markdown 代码已复制到剪贴板。', 'info');
            document.getElementById('report-modal').style.display = 'none';
        });
    };

})();
</script>
</body>
</html>
