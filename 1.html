<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Ultimate JSBridge Lab</title>
<style>
    :root {
        --bg: #0a0a10; --card: #13131f; --card-hover: #1c1c2e; --border: #2d2d44;
        --text: #e0e0e0; --text-dim: #8a8a9f;
        --blue: #00e5ff; --red: #ff3366; --yellow: #ffc107; --green: #00e676;
        --purple: #d500f9; --orange: #ff9100;
    }
    [data-theme="light"] {
        --bg: #f0f2f5; --card: #ffffff; --card-hover: #f8f9fa; --border: #dcdfe6;
        --text: #2c3e50; --text-dim: #7f8c8d;
        --blue: #0984e3; --red: #e74c3c; --yellow: #f39c12; --green: #27ae60;
        --purple: #8e44ad; --orange: #d35400;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace; background: var(--bg); color: var(--text); font-size: 13px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* 头部 */
    .header { background: var(--card); padding: env(safe-area-inset-top) 15px 10px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; flex-wrap: wrap; gap: 8px;}
    .header h1 { font-size: 16px; color: var(--blue); text-shadow: 0 0 10px rgba(0,229,255,0.3); }
    .bridge-badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; border: 1px solid var(--border); background: var(--bg); color: var(--text-dim); }
    .btn { padding: 6px 12px; border-radius: 4px; font-size: 12px; font-weight: bold; border: 1px solid var(--border); background: var(--bg); color: var(--text); cursor: pointer; transition: 0.1s; }
    .btn:active { transform: scale(0.95); }
    .btn.primary { background: rgba(0, 229, 255, 0.1); border-color: var(--blue); color: var(--blue); }
    .btn.danger { background: rgba(255, 51, 102, 0.1); border-color: var(--red); color: var(--red); }
    .btn.warn { background: rgba(255, 193, 7, 0.1); border-color: var(--yellow); color: var(--yellow); }

    /* 移动端 Tab 栏 (仅移动端显示) */
    .tabs { display: none; background: var(--card); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .tab { flex: 1; text-align: center; padding: 12px 0; font-size: 14px; font-weight: bold; color: var(--text-dim); border-bottom: 2px solid transparent; }
    .tab.active { color: var(--blue); border-bottom-color: var(--blue); }

    /* 三栏布局 */
    .workspace { display: flex; flex: 1; overflow: hidden; }
    .panel { display: flex; flex-direction: column; background: var(--bg); border-right: 1px solid var(--border); }
    .panel:last-child { border-right: none; }
    .panel-title { background: var(--card); padding: 8px 12px; font-weight: bold; color: var(--text); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-size: 12px;}
    .panel-body { flex: 1; overflow-y: auto; padding: 10px; }

    /* 左侧：对象列表 */
    .search-box { width: 100%; padding: 8px; background: var(--card); border: 1px solid var(--border); color: var(--text); border-radius: 4px; outline: none; margin-bottom: 10px; font-family: monospace;}
    .obj-item { padding: 8px 10px; background: var(--card); border: 1px solid var(--border); border-radius: 4px; margin-bottom: 6px; cursor: pointer; border-left: 3px solid transparent; display: flex; justify-content: space-between; align-items: center; }
    .obj-item.active { border-left-color: var(--blue); background: var(--card-hover); }
    .obj-name { font-family: monospace; font-weight: bold; font-size: 14px; word-break: break-all; }
    .tag { padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: bold; color: #fff; }
    .t-crit { background: var(--red); } .t-high { background: var(--orange); } .t-med { background: var(--yellow); color: #000;} .t-low { background: var(--green); color: #000;} .t-none { background: var(--border); }

    /* 中间：递归树结构 (还原 scanner2 的精髓) */
    .tree-item { display: flex; align-items: center; gap: 6px; padding: 3px 0; font-size: 13px; flex-wrap: wrap; border-bottom: 1px solid rgba(255,255,255,0.02);}
    .tree-toggle { width: 16px; cursor: pointer; color: var(--text-dim); text-align: center; }
    .tree-key { font-family: monospace; cursor: pointer; font-weight: bold; }
    .tree-key.function { color: var(--blue); }
    .tree-key.object { color: var(--green); }
    .tree-type { font-size: 10px; color: var(--text-dim); background: var(--card); padding: 1px 4px; border-radius: 2px; }
    .tree-val { color: var(--text-dim); word-break: break-all; max-width: 200px;}
    .tree-children { margin-left: 18px; display: none; border-left: 1px dashed var(--border); padding-left: 6px;}
    .tree-children.show { display: block; }

    /* 右侧：终端调用器 */
    .input-base { width: 100%; padding: 8px; background: var(--card); border: 1px solid var(--border); color: var(--text); border-radius: 4px; font-family: monospace; outline: none; margin-bottom: 8px; }
    .input-base:focus { border-color: var(--blue); }
    .control-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
    .checkbox-lbl { font-size: 12px; color: var(--text-dim); display: flex; align-items: center; gap: 4px; cursor: pointer; }
    
    .terminal { background: #000; border: 1px solid var(--border); border-radius: 4px; padding: 10px; height: 180px; overflow-y: auto; font-family: "Courier New", monospace; font-size: 11px; margin-bottom: 10px; }
    .log-line { margin-bottom: 4px; word-break: break-all; }
    .c-time { color: var(--text-dim); margin-right: 5px; }
    .c-ok { color: var(--green); } .c-err { color: var(--red); } .c-sys { color: var(--blue); } .c-warn { color: var(--yellow); }

    /* 报告弹窗 */
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; padding: env(safe-area-inset-top) 15px 15px; flex-direction: column;}
    .modal-content { background: var(--card); border: 1px solid var(--border); border-radius: 8px; flex: 1; display: flex; flex-direction: column; overflow: hidden; max-width: 800px; margin: 0 auto; width: 100%;}
    .modal-body { flex: 1; padding: 15px; overflow-y: auto; font-family: monospace; font-size: 12px; white-space: pre-wrap; -webkit-user-select: text; user-select: text; }

    /* 移动端响应式布局 */
    @media (max-width: 900px) {
        .tabs { display: flex; }
        .workspace { flex-direction: column; overflow-y: auto; }
        .panel { width: 100% !important; border-right: none; display: none; flex: none; height: calc(100vh - 120px); }
        .panel.active { display: flex; }
    }
</style>
</head>
<body>

<div class="header">
    <div>
        <h1>🛡️ Ultimate JSBridge Lab</h1>
        <div style="font-size: 10px; color: var(--text-dim);" id="ua-text">加载中...</div>
    </div>
    <div style="display: flex; gap: 8px; align-items: center;">
        <span class="bridge-badge" id="bridge-badge">环境识别中</span>
        <button class="btn" onclick="toggleTheme()">🌓</button>
        <button class="btn primary" onclick="__WVS__.export()">[P2] 导出报告</button>
    </div>
</div>

<div class="tabs" id="mobile-tabs">
    <div class="tab active" onclick="switchTab(0, this)">📦 对象池</div>
    <div class="tab" onclick="switchTab(1, this)">🌳 深度解析</div>
    <div class="tab" onclick="switchTab(2, this)">📡 终端调试</div>
</div>

<div class="workspace">
    <div class="panel active" style="width: 300px; flex-shrink: 0;">
        <div class="panel-title">
            <span>📦 对象池 (<span id="obj-count">0</span>)</span>
            <button class="btn" style="padding: 2px 6px;" onclick="__WVS__.scan()">🔄 扫描</button>
        </div>
        <div class="panel-body" style="display: flex; flex-direction: column; padding: 10px;">
            <input type="text" class="search-box" id="search-input" placeholder="搜索对象..." oninput="__WVS__.filter()">
            <div id="obj-list" style="flex: 1; overflow-y: auto; margin-bottom: 10px; border-bottom: 1px solid var(--border);"></div>
            
            <div style="flex-shrink: 0; background: var(--card); padding: 10px; border-radius: 6px; border: 1px solid var(--border);">
                <div style="color:var(--red); font-weight:bold; margin-bottom:6px;">🔥 字典爆破 (P1)</div>
                <div class="control-row">
                    <select id="brute-target" class="input-base" style="margin-bottom:0; flex: 1;"></select>
                    <button class="btn danger" id="btn-brute" onclick="__WVS__.brute()">START</button>
                </div>
                <div id="brute-log" style="font-size:11px; color:var(--text-dim); text-align:center; margin-top:4px;">使用 in 操作符安全探测隐藏方法</div>
            </div>
        </div>
    </div>

    <div class="panel" style="flex: 1;">
        <div class="panel-title">
            <span id="tree-title">🌳 对象深度分析</span>
            <div style="display:flex; gap:6px;">
                <button class="btn" style="padding: 2px 6px;" onclick="expandAll()">展开</button>
                <button class="btn" style="padding: 2px 6px;" onclick="collapseAll()">折叠</button>
            </div>
        </div>
        <div class="panel-body" id="tree-body">
            <div style="text-align:center; padding: 40px; color: var(--text-dim);">请在左侧列表选择一个对象</div>
        </div>
    </div>

    <div class="panel" style="width: 350px; flex-shrink: 0;">
        <div class="panel-title">
            <span>📡 渗透监控终端</span>
            <button class="btn danger" style="padding: 2px 6px;" id="btn-hook" onclick="__WVS__.hook()">[P3] 开启全局 Hook</button>
        </div>
        <div class="panel-body" style="display: flex; flex-direction: column;">
            <div class="terminal" id="term-box"></div>
            
            <div style="flex-shrink: 0;">
                <input type="text" id="exec-path" class="input-base" style="color:var(--green); font-weight:bold;" placeholder="执行路径 (如: window.obj.func)">
                
                <div class="control-row">
                    <select id="call-mode" class="input-base" style="margin-bottom:0; flex:1;" onchange="__WVS__.changeMode()">
                        <option value="json">JSON</option>
                        <option value="string">String</option>
                        <option value="manual">Manual</option>
                        <option value="multi">Multi Array</option>
                    </select>
                    <label class="checkbox-lbl" title="自动生成 _cb_ 时间戳函数接收异步结果">
                        <input type="checkbox" id="use-cb"> Callback
                    </label>
                </div>
                
                <input type="text" id="exec-params" class="input-base" placeholder='参数: {"data":1}'>
                
                <div class="control-row">
                    <button class="btn primary" style="flex: 2;" onclick="__WVS__.execute()">⚡ 发送 Call</button>
                    <button class="btn warn" style="flex: 1;" onclick="__WVS__.fuzz()">🧪 Fuzz</button>
                    <button class="btn" style="flex: 1;" onclick="__WVS__.deeplink()">🔗 Deeplink</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal" id="md-modal">
    <div class="modal-content">
        <div style="padding: 12px 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items:center;">
            <h3 style="color:var(--blue);">渗透报告 (Markdown)</h3>
            <div style="display:flex; gap:8px;">
                <button class="btn primary" onclick="__WVS__.copyReport()">复制内容</button>
                <button class="btn" onclick="document.getElementById('md-modal').style.display='none'">关闭</button>
            </div>
        </div>
        <div class="modal-body" id="md-body"></div>
    </div>
</div>

<script>
// 移动端 Tab 切换逻辑
function switchTab(index, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    const panels = document.querySelectorAll('.workspace > .panel');
    panels.forEach(p => p.classList.remove('active'));
    if(panels[index]) panels[index].classList.add('active');
}
function expandAll() { document.querySelectorAll('.tree-children').forEach(el => el.classList.add('show')); document.querySelectorAll('.tree-toggle').forEach(el => el.innerText = '▼'); }
function collapseAll() { document.querySelectorAll('.tree-children').forEach(el => el.classList.remove('show')); document.querySelectorAll('.tree-toggle').forEach(el => el.innerText = '▶'); }
function toggleTheme() { const h = document.documentElement; h.setAttribute("data-theme", h.getAttribute("data-theme") === "light" ? "dark" : "light"); }

window.__WVS__ = (function() {
    // 黑名单，保护扫描器自身
    const INTERNAL_KEYS = ["switchTab", "expandAll", "collapseAll", "toggleTheme", "__WVS__"];
    const IGNORES = ["apply", "bind", "call", "toString", "length", "name", "prototype", "constructor", "caller", "callee"];
    
    const KNOWLEDGE = [
        { kw: ["exec","eval","shell","system"], cat: "命令执行", r: "t-crit", desc: "可执行系统级命令" },
        { kw: ["pay","alipay","wxpay"], cat: "支付接口", r: "t-crit", desc: "拉起支付结算链路" },
        { kw: ["contact","addressbook"], cat: "通讯录", r: "t-high", desc: "获取用户隐私通讯录" },
        { kw: ["file","readfile","openurl"], cat: "文件/越权", r: "t-high", desc: "读取文件或打开跨域URL" },
        { kw: ["login","token","auth"], cat: "凭证操作", r: "t-high", desc: "操作用户登录凭证" },
        { kw: ["intent","startactivity"], cat: "组件逃逸", r: "t-high", desc: "拉起App内部原生组件" },
        { kw: ["deviceid","imei","mac"], cat: "设备指纹", r: "t-med", desc: "获取设备唯一识别码" },
        { kw: ["location","gps"], cat: "物理定位", r: "t-med", desc: "获取真实GPS坐标" }
    ];
    
    const BRUTE_DICT = ["getUserInfo","getDeviceId","getToken","pay","getLocation","read","write","download","openUrl","startActivity","getContacts","invoke","execute","call","postMessage","showAddressBook","scanQRCode","closeWindow","setupWebViewJavascriptBridge"];
    const FUZZ_PARAMS = ["", "test", "123", "{}", "[]", "null", "undefined", '{"a":1}', '["a","b"]', "../../../etc/passwd"];

    let scanData = [];
    let isHooked = false;
    const termBox = document.getElementById('term-box');

    function log(msg, type = 'c-sys') {
        const time = new Date().toLocaleTimeString().split(' ')[0];
        const line = document.createElement('div');
        line.className = `log-line ${type}`;
        line.innerHTML = `<span class="c-time">[${time}]</span>${msg}`;
        termBox.appendChild(line);
        termBox.scrollTop = termBox.scrollHeight;
    }
    
    function safeStr(obj) { try { return typeof obj === 'object' && obj !== null ? JSON.stringify(obj) : String(obj); } catch(e) { return "[Object]"; } }
    
    function evalRisk(name) {
        const s = name.toLowerCase();
        for(let r of KNOWLEDGE) { if(r.kw.some(k => s.includes(k))) return r; }
        return { cat: "常规接口", r: "t-none", desc: "自定义业务属性" };
    }

    // [恢复 scanner2 精髓] 框架指纹识别
    function detectBridge() {
        let type = "Android (Unknown)";
        if(window.webkit && window.webkit.messageHandlers) type = "iOS WKWebView";
        else if(window.WebViewJavascriptBridge || window.JsBridge) type = "JsBridge Framework";
        else if(window.cordova) type = "Cordova / PhoneGap";
        else if(window.ReactNativeWebView) type = "React Native";
        
        document.getElementById('bridge-badge').innerText = type;
        log(`环境识别: ${type}`);
    }

    // [P0] 准确发现：Iframe 白名单 + iOS 特殊通道
    function scan() {
        let keys = [];
        try {
            const iframe = document.createElement("iframe");
            iframe.style.display = "none";
            document.body.appendChild(iframe);
            const clean = Object.getOwnPropertyNames(iframe.contentWindow);
            const curr = Object.getOwnPropertyNames(window);
            iframe.remove();
            keys = curr.filter(k => !clean.includes(k) && !k.startsWith("on") && !INTERNAL_KEYS.includes(k));
        } catch(e) {
            keys = Object.keys(window).filter(k => !["window","document","location","navigator","localStorage","sessionStorage","console"].includes(k) && !INTERNAL_KEYS.includes(k));
        }

        scanData = [];
        let tCount = 0;

        // 1. iOS 解析
        if (window.webkit && window.webkit.messageHandlers) {
            Object.keys(window.webkit.messageHandlers).forEach(h => {
                scanData.push({ name: `webkit.messageHandlers.${h}`, objRef: window.webkit.messageHandlers[h], info: evalRisk(h) });
                tCount++;
            });
        }
        
        // 2. 常规解析
        keys.filter(k => k !== "webkit").forEach(key => {
            let obj; try { obj = window[key]; } catch(e) { return; }
            if(typeof obj === "object" || typeof obj === "function") {
                scanData.push({ name: key, objRef: obj, info: evalRisk(key) });
                tCount++;
            }
        });

        document.getElementById('obj-count').innerText = tCount;
        renderList();
        updateBruteSelect();
        log(`扫描完成，发现 ${tCount} 个原生对象。`, 'c-ok');
    }

    function renderList() {
        const q = document.getElementById('search-input').value.toLowerCase();
        const list = document.getElementById('obj-list');
        list.innerHTML = "";
        
        scanData.forEach((item, idx) => {
            if(q && !item.name.toLowerCase().includes(q)) return;
            const div = document.createElement('div');
            div.className = 'obj-item';
            div.innerHTML = `<span class="obj-name">${item.name}</span><span class="tag ${item.info.r}">${item.info.cat}</span>`;
            div.onclick = () => {
                document.querySelectorAll('.obj-item').forEach(el => el.classList.remove('active'));
                div.classList.add('active');
                renderTree(item);
                // 移动端自动切 Tab
                if(window.innerWidth <= 900) switchTab(1, document.querySelectorAll('.tab')[1]);
            };
            list.appendChild(div);
        });
    }

    // [恢复 scanner2 精髓] 无限层级递归树，带 WeakSet 防死循环
    function renderTree(item) {
        document.getElementById('tree-title').innerText = `🌳 ${item.name}`;
        const container = document.getElementById('tree-body');
        container.innerHTML = "";
        container.appendChild(buildTreeNode(item.objRef, `window.${item.name}`, new WeakSet()));
    }

    function buildTreeNode(obj, path, visited) {
        if(obj && typeof obj === 'object') {
            if(visited.has(obj)) {
                const div = document.createElement('div'); div.className = 'tree-item'; div.innerHTML = '<span class="tree-key">🔄 循环引用</span>'; return div;
            }
            visited.add(obj);
        }

        const wrapper = document.createElement('div');
        const head = document.createElement('div');
        head.className = 'tree-item';
        
        const typeStr = typeof obj;
        const isParent = obj && (typeStr === 'object' || typeStr === 'function');
        
        let toggleHTML = isParent ? `<span class="tree-toggle" onclick="this.parentElement.nextElementSibling.classList.toggle('show'); this.innerText = this.innerText==='▶'?'▼':'▶'">▶</span>` : `<span style="width:16px;"></span>`;
        
        const name = path.split('.').pop();
        const rInfo = evalRisk(name);
        const tagHTML = rInfo.r !== 't-none' ? `<span class="tag ${rInfo.r}">${rInfo.cat}</span>` : '';
        
        let valHTML = "";
        if(!isParent) valHTML = `<span class="tree-val"> = ${safeStr(obj)}</span>`;
        
        let actionHTML = typeStr === 'function' || path.includes("messageHandlers") ? `<button class="action-btn" onclick="__WVS__.loadPath('${path}')">Load</button>` : '';

        head.innerHTML = `${toggleHTML}<span class="tree-key ${typeStr}">${name}</span><span class="tree-type">${typeStr}</span>${tagHTML}${valHTML}${actionHTML}`;
        wrapper.appendChild(head);

        if(isParent) {
            const childrenDiv = document.createElement('div');
            childrenDiv.className = 'tree-children';
            try {
                let keys = Object.getOwnPropertyNames(obj);
                const proto = Object.getPrototypeOf(obj);
                if(proto && proto !== Object.prototype && proto !== Function.prototype) keys = [...new Set([...keys, ...Object.getOwnPropertyNames(proto)])];
                
                keys.forEach(k => {
                    if(IGNORES.includes(k)) return;
                    try {
                        const childNode = buildTreeNode(obj[k], `${path}.${k}`, visited);
                        childrenDiv.appendChild(childNode);
                    } catch(e){}
                });
            } catch(e) {}
            wrapper.appendChild(childrenDiv);
        }
        return wrapper;
    }

    function updateBruteSelect() {
        const sel = document.getElementById('brute-target');
        sel.innerHTML = '<option value="">选择目标...</option>';
        scanData.forEach(i => {
            if(typeof i.objRef === 'object') sel.innerHTML += `<option value="${i.name}">window.${i.name}</option>`;
        });
    }

    return {
        init: function() {
            document.getElementById('ua-text').innerText = navigator.userAgent;
            detectBridge();
            scan();
        },
        scan: scan,
        filter: renderList,
        
        loadPath: function(path) {
            document.getElementById('exec-path').value = path;
            log(`已装载路径: ${path}`);
            if(window.innerWidth <= 900) switchTab(2, document.querySelectorAll('.tab')[2]);
        },

        changeMode: function() {
            const mode = document.getElementById('call-mode').value;
            const hints = { "manual": '参数', "string": '"text"', "json": '{"a":1}', "multi": '["a", 1]' };
            document.getElementById('exec-params').placeholder = hints[mode];
        },

        // [恢复 scanner2 精髓] 异步 Callback 注入 & 多模式传参
        execute: function() {
            const path = document.getElementById('exec-path').value;
            const pRaw = document.getElementById('exec-params').value.trim();
            const mode = document.getElementById('call-mode').value;
            const useCb = document.getElementById('use-cb').checked;
            if(!path) return;

            log(`> 发送执行: ${path}`, 'c-warn');
            try {
                let t = window; let p = null;
                path.replace("window.", "").split('.').forEach(k => { p = t; t = t[k]; });

                let args = [];
                if(pRaw) {
                    if(mode === 'json') args = [JSON.parse(pRaw)];
                    else if(mode === 'string') args = [pRaw];
                    else if(mode === 'multi') args = JSON.parse(pRaw);
                    else { try { args = [JSON.parse(pRaw)]; } catch(e){ args = [pRaw]; } }
                }

                // [P1] iOS WKWebView 特殊处理
                if(path.includes("webkit.messageHandlers")) {
                    t.call(p, args[0]||{});
                    return log(`<- iOS message 已送出`, 'c-ok');
                }

                if(typeof t === 'function') {
                    // [恢复] 注入 Callback
                    if(useCb) {
                        const cbName = "_cb_" + Date.now();
                        window[cbName] = function(data) {
                            log(`[Callback 返回] ${safeStr(data)}`, 'c-ok');
                            delete window[cbName];
                        };
                        args.push(window[cbName]);
                        t.apply(p, args);
                        log(`<- 已注入回调函数 window.${cbName}，等待响应...`, 'c-warn');
                    } else {
                        const res = t.apply(p, args);
                        log(`<- 返回值: ${res !== undefined ? safeStr(res) : 'undefined'}`, 'c-ok');
                    }
                } else {
                    log(`<- 属性读取: ${safeStr(t)}`, 'c-ok');
                }
            } catch(e) { log(`! 执行报错: ${e.message}`, 'c-err'); }
        },

        // [恢复 scanner2 精髓] Fuzzing 测试
        fuzz: function() {
            const path = document.getElementById('exec-path').value.replace("window.", "");
            if(!path) return alert("请指定执行路径");
            if(!confirm(`将发送 ${FUZZ_PARAMS.length} 种异常参数测试崩溃，继续？`)) return;
            
            log(`[Fuzz] 启动模糊测试: ${path}`, 'c-warn');
            let t = window; let p = null;
            try { path.split('.').forEach(k => { p = t; t = t[k]; }); } catch(e) { return log(`无效路径`, 'c-err'); }

            if(typeof t !== 'function') return log(`目标非函数`, 'c-err');

            let errCount = 0;
            FUZZ_PARAMS.forEach((param, idx) => {
                setTimeout(() => {
                    try {
                        let arg = param;
                        if(param==="null") arg = null; else if(param==="undefined") arg = undefined; else { try{arg=JSON.parse(param);}catch(e){} }
                        t.call(p, arg);
                        log(`[Fuzz ${idx+1}] 发送: ${param} -> 正常`, 'c-sys');
                    } catch(e) {
                        errCount++;
                        log(`[Fuzz ${idx+1}] 💥 异常: ${e.message}`, 'c-err');
                    }
                    if(idx === FUZZ_PARAMS.length -1) log(`[Fuzz 结束] 触发异常: ${errCount} 次。若App未闪退，说明底座鲁棒性良好。`, 'c-warn');
                }, idx * 50);
            });
        },

        // [P1] in 爆破 (防卡死分批)
        brute: function() {
            const tName = document.getElementById('brute-target').value;
            if(!tName) return alert("请选择目标");
            let targetObj; try { targetObj = window[tName]; } catch(e) { return; }

            const prog = document.getElementById('brute-log');
            document.getElementById('btn-brute').disabled = true;
            let idx = 0, found = 0;
            log(`[Brute] 开始用 'in' 操作符试探 ${tName}...`, 'c-warn');

            function step() {
                if(idx >= BRUTE_DICT.length) {
                    document.getElementById('btn-brute').disabled = false;
                    prog.innerText = `爆破完毕，发现 ${found} 个隐藏入口。`;
                    // 重新扫描以更新左侧列表和树
                    scan(); 
                    return;
                }
                const mName = BRUTE_DICT[idx];
                prog.innerText = `试探: ${mName} [${idx+1}/${BRUTE_DICT.length}]`;
                
                try {
                    // [P1核心] 使用 in 更安全
                    if(mName in targetObj) {
                        found++;
                        log(`🎯 撞库命中: .${mName}()`, 'c-ok');
                    }
                } catch(e) {
                    found++;
                    log(`🎯 越权拦截证实存在: .${mName}()`, 'c-err');
                }
                idx++; setTimeout(step, 10);
            }
            step();
        },

        // Deeplink
        deeplink: function() {
            let url = document.getElementById('exec-params').value;
            if(!url.includes('://')) url = document.getElementById('exec-path').value;
            if(!url.includes('://')) return log("! 请输入合法的 Scheme URL", "c-err");

            log(`> 盲发 Deeplink: ${url}`, 'c-warn');
            const cbName = "_dlcb_" + Date.now();
            window[cbName] = function(res) { log(`🔥 Scheme回调: ${safeStr(res)}`, "c-ok"); };
            
            const fUrl = url.includes("?") ? `${url}&callback=${cbName}` : `${url}?callback=${cbName}`;
            const iframe = document.createElement("iframe");
            iframe.style.display = "none"; iframe.src = fUrl;
            document.body.appendChild(iframe);
            setTimeout(() => iframe.remove(), 3000);
        },

        // [P3] 全局 Hook
        hook: function() {
            if(isHooked) return log('Hook 已开启', 'c-warn');
            let hCount = 0;
            scanData.forEach(item => {
                let obj; try { obj = window[item.name]; } catch(e){ return; }
                if(typeof obj === 'object') {
                    Object.getOwnPropertyNames(obj).forEach(k => {
                        if(typeof obj[k] === 'function' && !obj[k].__hooked) {
                            try {
                                const orig = obj[k];
                                obj[k] = function(...args) {
                                    log(`[AOP 拦截] <b>${item.name}.${k}</b>( ${args.map(a=>safeStr(a)).join(', ')} )`, 'c-hook');
                                    return orig.apply(this, args);
                                };
                                obj[k].__hooked = true;
                                hCount++;
                            } catch(e){}
                        }
                    });
                }
            });
            window.addEventListener("message", e => log(`[被动推送] Msg: ${safeStr(e.data)}`, 'c-hook'));
            isHooked = true;
            document.getElementById('btn-hook').innerText = "🛑 Hook 监听中";
            log(`[P3] AOP 部署完成，接管 ${hCount} 个方法。`, 'c-ok');
        },

        // [P2] 导出报告
        export: function() {
            let md = `# JSBridge 安全扫描报告\n\n> **生成时间:** ${new Date().toLocaleString()}\n> **识别指纹:** ${document.getElementById('bridge-badge').innerText}\n> **UA:** ${navigator.userAgent}\n\n`;
            
            md += `## 注入对象发现 (${scanData.length}个)\n`;
            scanData.forEach(obj => {
                md += `\n### \`window.${obj.name}\` [${obj.info.cat}]\n`;
                let hasMethod = false;
                if(typeof obj.objRef === 'object') {
                    try {
                        let props = Object.getOwnPropertyNames(obj.objRef);
                        const proto = Object.getPrototypeOf(obj.objRef);
                        if(proto && proto !== Object.prototype) props = [...new Set([...props, ...Object.getOwnPropertyNames(proto)])];
                        
                        props.forEach(p => {
                            if(!IGNORES.includes(p)) {
                                hasMethod = true;
                                const mInfo = evalRisk(p);
                                md += `- \`.${p}()\` ${mInfo.r !== 't-none' ? `**(🚨风险: ${mInfo.desc})**` : ''}\n`;
                            }
                        });
                    } catch(e){}
                }
                // iOS 专属
                if(obj.name.includes("messageHandlers")) {
                    hasMethod = true;
                    md += `- \`.postMessage()\` *(iOS 消息通道)*\n`;
                }
                
                if(!hasMethod) md += `- *(未暴露公共方法，请使用爆破进行二次确认)*\n`;
            });

            document.getElementById('md-body').innerText = md;
            document.getElementById('md-modal').style.display = 'flex';
        },

        copyReport: function() {
            const ta = document.createElement("textarea");
            ta.value = document.getElementById('md-body').innerText; 
            document.body.appendChild(ta); ta.select(); document.execCommand("copy"); ta.remove();
            alert("Markdown 报告已复制！");
        }
    };
})();

// 启动
setTimeout(window.__WVS__.init, 200);
</script>
